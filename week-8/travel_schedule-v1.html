// Module-scope helpers (accessible from modal functions too)
const blocks = [];

function createEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function timeToY(timeStr, blockY) {
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return blockY;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const totalHours = h + min/60;
  return blockY + (totalHours - HOUR_TOP) * HOUR_HEIGHT;
}

function noteStyle(type) {
  if (type === 'checkin')   return { color: '#27ae60', label: '✓ IN' };
  if (type === 'checkout')  return { color: '#c0392b', label: '✗ OUT' };
  if (type === 'excursion') return { color: '#8e44ad', label: '★' };
  if (type === 'flight')    return { color: '#e67e22', label: '✈' };
  return { color: '#2980b9', label: '' };
}

// Extract place_id from a Google Maps URL
function extractPlaceId(url) {
  if (!url) return null;
  const m = url.match(/place_id:([A-Za-z0-9_-]+)/);
  return m ? m[1] : null;
}

// Get [lat, lng] for an item, returns null if unknown
function getCoords(item) {
  if (!item) return null;
  if (item.lat !== undefined && item.lng !== undefined) return [item.lat, item.lng];
  const pid = extractPlaceId(item.link);
  return pid ? coordsByPlaceId[pid] : null;
}

// ===== Open-Meteo live weather (no API key / no signup) =====

// Remove a leading "[team name] " prefix from a label so the block/modal
// can show the clean title (team is conveyed by column/lane instead).
function stripTeamPrefix(label) {
  if (!label) return label;
  return label.replace(/^\[[^\]]+\]\s*/, '');
}

// Convert "HH:MM" 24-hour string to localized 12-hour text.
// Korean: "오전/오후 H:MM",  English: "H:MM AM/PM"
function fmt12(hhmm) {
  if (!hhmm || hhmm.indexOf(':') < 0) return hhmm || '';
  const parts = hhmm.split(':');
  let h = parseInt(parts[0], 10);
  const m = parts[1].padStart(2, '0');
  if (isNaN(h)) return hhmm;
  if (currentLang === 'ko') {
    const period = h < 12 ? '오전' : '오후';
    let h12 = h % 12; if (h12 === 0) h12 = 12;
    return `${period} ${h12}:${m}`;
  } else {
    const ampm = h < 12 ? 'AM' : 'PM';
    let h12 = h % 12; if (h12 === 0) h12 = 12;
    return `${h12}:${m} ${ampm}`;
  }
}

// WMO weather code → icon + condition text
function wmoToIcon(code) {
  if (code === 0) return { icon: '☀️', en: 'Clear', ko: '맑음' };
  if (code === 1) return { icon: '🌤️', en: 'Mostly Clear', ko: '대체로 맑음' };
  if (code === 2) return { icon: '⛅', en: 'Partly Cloudy', ko: '구름 조금' };
  if (code === 3) return { icon: '☁️', en: 'Overcast', ko: '흐림' };
  if (code === 45 || code === 48) return { icon: '🌫️', en: 'Fog', ko: '안개' };
  if (code >= 51 && code <= 57) return { icon: '🌦️', en: 'Drizzle', ko: '이슬비' };
  if (code >= 61 && code <= 67) return { icon: '🌧️', en: 'Rain', ko: '비' };
  if (code >= 71 && code <= 77) return { icon: '🌨️', en: 'Snow', ko: '눈' };
  if (code >= 80 && code <= 82) return { icon: '🌧️', en: 'Rain Showers', ko: '소나기' };
  if (code >= 85 && code <= 86) return { icon: '🌨️', en: 'Snow Showers', ko: '눈 소나기' };
  if (code >= 95) return { icon: '⛈️', en: 'Thunderstorm', ko: '뇌우' };
  return { icon: '⛅', en: 'Mixed', ko: '대체로 흐림' };
}

// Fetch live weather for one location; updates the passed weather object in place.
// Returns true on success, false on failure (caller keeps climatology fallback).
async function fetchLiveWeather(w) {
  if (w.lat === undefined || w.lng === undefined) return false;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${w.lat}&longitude=${w.lng}`
    + `&current=temperature_2m,weather_code`
    + `&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,weather_code,precipitation_probability_max`
    + `&hourly=temperature_2m,weather_code`
    + `&timezone=auto&forecast_days=10`;
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout ? AbortSignal.timeout(6000) : undefined });
    if (!res.ok) return false;
    const d = await res.json();
    if (!d || !d.current) return false;

    const wm = wmoToIcon(d.current.weather_code);
    w.now = Math.round(d.current.temperature_2m);
    w.icon = wm.icon;
    w.cond = wm.en;
    w.cond_ko = wm.ko;
    if (d.daily) {
      w.hi = Math.round(d.daily.temperature_2m_max[0]);
      w.lo = Math.round(d.daily.temperature_2m_min[0]);
      if (d.daily.sunrise && d.daily.sunrise[0]) w.sunrise = d.daily.sunrise[0].slice(11, 16);
      if (d.daily.sunset && d.daily.sunset[0]) w.sunset = d.daily.sunset[0].slice(11, 16);
      // Build the 10-day forecast array
      if (d.daily.time && d.daily.time.length) {
        const days10 = [];
        for (let i = 0; i < d.daily.time.length; i++) {
          const dwm = wmoToIcon(d.daily.weather_code ? d.daily.weather_code[i] : 0);
          days10.push({
            date: d.daily.time[i],                                   // "2026-05-23"
            hi: Math.round(d.daily.temperature_2m_max[i]),
            lo: Math.round(d.daily.temperature_2m_min[i]),
            icon: dwm.icon,
            cond: dwm.en,
            cond_ko: dwm.ko,
            pop: d.daily.precipitation_probability_max
                 ? d.daily.precipitation_probability_max[i] : null
          });
        }
        w.daily10 = days10;
      }
    }
    // Build an hourly curve at ~9AM,12PM,3PM,6PM,9PM local
    if (d.hourly && d.hourly.time) {
      const picks = [9, 12, 15, 18, 21];
      const labels = ['9AM', '12PM', '3PM', '6PM', '9PM'];
      const newHourly = [];
      picks.forEach((hr, i) => {
        // find index whose hour matches
        const idx = d.hourly.time.findIndex(t => parseInt(t.slice(11, 13), 10) === hr);
        if (idx >= 0) {
          const hwm = wmoToIcon(d.hourly.weather_code[idx]);
          newHourly.push([labels[i], Math.round(d.hourly.temperature_2m[idx]), hwm.icon]);
        }
      });
      if (newHourly.length) w.hourly = newHourly;
    }
    w._live = true;
    return true;
  } catch (e) {
    return false;
  }
}

// Fetch all weather (main + stacked) for every city, then re-render galleries.
let weatherLiveAttempted = false;
async function refreshAllWeather() {
  if (weatherLiveAttempted) return;
  weatherLiveAttempted = true;
  const jobs = [];
  Object.keys(weatherData).forEach(city => {
    const wx = weatherData[city];
    if (wx.main) jobs.push(fetchLiveWeather(wx.main));
    if (wx.stack) wx.stack.forEach(s => jobs.push(fetchLiveWeather(s)));
  });
  try {
    await Promise.allSettled(jobs);
  } catch (e) { /* ignore */ }
  // Re-render everything (buildDiagram rebuilds weather galleries internally)
  buildDiagram();
}

function buildDiagram() {
  // Clear existing SVG content (keep <defs>)
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  // Re-insert defs
  const defs = document.createElementNS(SVG_NS, 'defs');
  defs.innerHTML = `
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>`;
  svg.appendChild(defs);

  // Reset blocks array
  blocks.length = 0;
  let currentX = BLOCK_X_START;

  schedule.forEach((item, idx) => {
    const width = COL_WIDTH * item.days;
    blocks.push({
      ...item, idx,
      x: currentX, y: BLOCK_Y,
      width: width, height: BLOCK_HEIGHT
    });
    currentX += width + BLOCK_GAP;
  });

  svg.setAttribute('width', currentX + 180);
  svg.setAttribute('height', BLOCK_Y + BLOCK_HEIGHT + 130);

// Time axis
const axisX = 50;
for (let h = HOUR_TOP; h <= HOUR_BOTTOM; h += 2) {
  const y = BLOCK_Y + (h - HOUR_TOP) * HOUR_HEIGHT;
  const label = createEl('text', {
    x: axisX, y: y + 4,
    'text-anchor': 'end',
    'font-size': 10, fill: '#888'
  });
  const hr12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const ampm = h >= 12 ? 'PM' : 'AM';
  label.textContent = `${hr12}${ampm}`;
  svg.appendChild(label);
}

// Draw blocks
blocks.forEach((b) => {
  const datesArr = L(b, 'dates') || b.dates;
  for (let d = 0; d < b.days; d++) {
    const dateLabel = createEl('text', {
      x: b.x + d * COL_WIDTH + COL_WIDTH/2,
      y: b.y - 16,
      'text-anchor': 'middle',
      'font-size': 11, fill: '#666',
      'font-weight': 'bold'
    });
    dateLabel.textContent = datesArr[d] || '';
    svg.appendChild(dateLabel);
  }

  // ===== Build tab list FIRST (layout below needs tabs.length) =====
  const cityPlaces = placesData[b.location] || {};
  const tabs = [
    { id: 'schedule',    label: T().schedule },
    { id: 'restaurants', label: T().restaurants },
    { id: 'shopping',    label: T().shopping }
  ];
  if (cityPlaces.groceries && cityPlaces.groceries.length > 0) {
    tabs.push({ id: 'groceries', label: T().groceries });
  }
  if (cityPlaces.specialties && cityPlaces.specialties.length > 0) {
    tabs.push({ id: 'specialties', label: T().specialties });
  }
  if (cityPlaces.pasta && cityPlaces.pasta.length > 0) {
    tabs.push({ id: 'pasta', label: T().pasta });
  }
  if (cityPlaces.terminals && cityPlaces.terminals.length > 0) {
    tabs.push({ id: 'terminal', label: T().terminal });
  }
  if (weatherData[b.location]) {
    tabs.push({ id: 'weather', label: T().weather });
  }

  // ===== Compute layout: city title (top) → badges → tabs → hotel/people → block =====
  const tabsPerRow = 3;
  const tabH = 18;
  const tabGap = 4;
  const rowGap = 3;
  const totalRows = Math.ceil(tabs.length / tabsPerRow);
  const tabGridHeight = totalRows * tabH + (totalRows - 1) * rowGap;

  // Vertical stack (going up from b.y):
  //   hotel:   b.y - 84
  //   people:  b.y - 68   (kept where they were)
  //   tabs:    end at b.y - 100, height tabGridHeight
  //   badges:  just above tabs
  //   title:   above badges (TOP)
  const tabBottomY = b.y - 100;
  const tabY = tabBottomY - tabGridHeight;
  const badgeRowY = tabY - 30;          // badges sit above the tab grid
  const titleY = badgeRowY - 34;        // city name + local time (2 lines) above badges

  // ----- Local time + day/night icon -----
  // tzLabel like "CEST (KST −7h)" → offset hours vs Korea. We display the
  // destination's local clock based on the viewer's current time.
  const wxForCity = weatherData[b.location];
  let localTimeStr = '';
  let dayNightIcon = '';
  if (wxForCity && wxForCity.main) {
    // Europe (CEST) = KST − 7h = UTC + 2h. Compute destination local time.
    const now = new Date();
    const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
    const destMs = utcMs + 2 * 3600000; // CEST = UTC+2
    const dt = new Date(destMs);
    let hh = dt.getHours();
    const mm = dt.getMinutes();
    const ampm = hh >= 12 ? 'PM' : 'AM';
    let h12 = hh % 12; if (h12 === 0) h12 = 12;
    localTimeStr = `${h12}:${String(mm).padStart(2, '0')} ${ampm}`;
    // Day/night by sunrise/sunset of the main city
    const sr = wxForCity.main.sunrise || '06:00';
    const ss = wxForCity.main.sunset || '21:00';
    const srMin = parseInt(sr.slice(0,2),10)*60 + parseInt(sr.slice(3,5),10);
    const ssMin = parseInt(ss.slice(0,2),10)*60 + parseInt(ss.slice(3,5),10);
    const nowMin = hh*60 + mm;
    dayNightIcon = (nowMin >= srMin && nowMin < ssMin) ? '☀️' : '🌙';
  }

  // ----- City title + local time (TOP) -----
  const locText = L(b, 'location');
  const titleStr = dayNightIcon
    ? `${locText}  ·  ${dayNightIcon} ${localTimeStr}`
    : locText;
  const locLabel = createEl('text', {
    x: b.x + b.width/2, y: titleY,
    'text-anchor': 'middle',
    'dominant-baseline': 'middle',
    'font-size': 18, 'font-weight': 'bold', fill: '#222'
  });
  locLabel.textContent = locText;
  svg.appendChild(locLabel);

  // local time as a second line right under the name (larger font)
  if (localTimeStr) {
    const localTimeLabel = createEl('text', {
      x: b.x + b.width/2, y: titleY + 20,
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
      'font-size': 13, 'font-weight': '600', fill: '#666'
    });
    localTimeLabel.textContent = `${dayNightIcon} ${localTimeStr} (${currentLang === 'ko' ? '현지' : 'local'})`;
    svg.appendChild(localTimeLabel);
  }

  // ----- Badges row (Details + Map) just above the tabs -----
  const badgeLabel = T().detailsBadge;
  const badgeW = currentLang === 'ko' ? 52 : 60;
  const badgeH = 18;
  const mapBadgeLabel = T().mapBadge;
  const mapBadgeW = currentLang === 'ko' ? 48 : 52;
  const bgap = 10;
  const badgesTotalW = badgeW + bgap + mapBadgeW;
  const badgesStartX = b.x + b.width/2 - badgesTotalW/2;
  const badgeX = badgesStartX;
  const mapBadgeX = badgesStartX + badgeW + bgap;
  const badgeY = badgeRowY;

  const badgeRect = createEl('rect', {
    x: badgeX, y: badgeY,
    width: badgeW, height: badgeH,
    fill: '#fff7e6', stroke: '#e67e22',
    'stroke-width': 1.2, rx: 9,
    style: 'cursor: pointer;',
    'data-detail-block': b.idx,
    'class': 'detail-badge'
  });
  svg.appendChild(badgeRect);

  const badgeText = createEl('text', {
    x: badgeX + badgeW/2, y: badgeY + 13,
    'text-anchor': 'middle',
    'font-size': 10, 'font-weight': 'bold', fill: '#d35400',
    style: 'cursor: pointer; pointer-events: none;'
  });
  badgeText.textContent = '🔍 ' + badgeLabel;
  svg.appendChild(badgeText);

  const mapBadgeRect = createEl('rect', {
    x: mapBadgeX, y: badgeY,
    width: mapBadgeW, height: badgeH,
    fill: '#e6f3fb', stroke: '#2980b9',
    'stroke-width': 1.2, rx: 9,
    style: 'cursor: pointer;',
    'data-map-block': b.idx,
    'class': 'map-badge'
  });
  svg.appendChild(mapBadgeRect);

  const mapBadgeText = createEl('text', {
    x: mapBadgeX + mapBadgeW/2, y: badgeY + 13,
    'text-anchor': 'middle',
    'font-size': 10, 'font-weight': 'bold', fill: '#1e6091',
    style: 'cursor: pointer; pointer-events: none;'
  });
  mapBadgeText.textContent = '🗺️ ' + mapBadgeLabel;
  svg.appendChild(mapBadgeText);

  const hotelLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 84,
    'text-anchor': 'middle',
    'font-size': 11, 'font-style': 'italic', fill: '#777'
  });
  hotelLabel.textContent = L(b, 'hotel');
  svg.appendChild(hotelLabel);

  const palette = paletteFor(b.location);

  // Clip path to keep zebra and lane fills inside the rounded block
  const clipId = `clip-block-${b.idx}`;
  const clipPath = createEl('clipPath', { id: clipId });
  clipPath.appendChild(createEl('rect', {
    x: b.x, y: b.y,
    width: b.width, height: b.height,
    rx: 6
  }));
  svg.appendChild(clipPath);

  // Main block background (pastel base color)
  const rect = createEl('rect', {
    x: b.x, y: b.y,
    width: b.width, height: b.height,
    fill: palette.base, stroke: '#444',
    'stroke-width': 1.5, rx: 6,
    filter: 'url(#shadow)'
  });
  svg.appendChild(rect);

  // Zebra + lane backgrounds go in a group so we can hide them on the Weather tab
  const zebraGroup = createEl('g', { id: `zebra-${b.idx}` });
  svg.appendChild(zebraGroup);

  // Zebra: alternating shades for each day column (clipped to rounded rect)
  for (let d = 0; d < b.days; d++) {
    if (d % 2 === 1) {  // only paint odd-indexed columns; even ones use the base
      const dayRect = createEl('rect', {
        x: b.x + d * COL_WIDTH, y: b.y,
        width: COL_WIDTH, height: b.height,
        fill: palette.zebra[1],
        'clip-path': `url(#${clipId})`
      });
      zebraGroup.appendChild(dayRect);
    }
  }

  // Team-lane backgrounds for split days — only paint the actual time range
  // where the split happens (from the earliest team-tagged note to the latest),
  // not the full day column.
  const splitRangesByDay = {};
  b.notes.forEach(n => {
    if (!n.team) return;
    if (!splitRangesByDay[n.day]) splitRangesByDay[n.day] = [];
    splitRangesByDay[n.day].push(n);
  });
  Object.keys(splitRangesByDay).forEach(dStr => {
    const d = parseInt(dStr, 10);
    const teamNotes = splitRangesByDay[dStr];
    // Find earliest and latest team-tagged note times
    const ys = teamNotes.map(n => timeToY(n.time, b.y));
    const startY = Math.min(...ys) - 4;  // small pad above first note
    const endY = Math.max(...ys) + 14;   // small pad below last note (label height)
    const clampedStart = Math.max(b.y, startY);
    const clampedEnd = Math.min(b.y + b.height, endY);
    const splitH = clampedEnd - clampedStart;
    if (splitH <= 0) return;

    const dayX = b.x + d * COL_WIDTH;
    const half = COL_WIDTH / 2;
    // Left lane (team A) - subtle tint
    zebraGroup.appendChild(createEl('rect', {
      x: dayX, y: clampedStart,
      width: half, height: splitH,
      fill: palette.laneA,
      'clip-path': `url(#${clipId})`
    }));
    // Right lane (team B) - slightly stronger tint
    zebraGroup.appendChild(createEl('rect', {
      x: dayX + half, y: clampedStart,
      width: half, height: splitH,
      fill: palette.laneB,
      'clip-path': `url(#${clipId})`
    }));
  });

  // Single-color overlay shown ONLY on the Weather tab (hides zebra confusion)
  const weatherBg = createEl('rect', {
    id: `weather-bg-${b.idx}`,
    x: b.x, y: b.y,
    width: b.width, height: b.height,
    fill: palette.base, rx: 6,
    'clip-path': `url(#${clipId})`,
    style: 'display: none;'
  });
  svg.appendChild(weatherBg);

  // ===== Tab badges in 2-row grid (max 3 tabs per row) =====
  // (tabs array + tabsPerRow, tabH, tabGap, rowGap, tabGridHeight, tabY all computed earlier)

  // Each row may have different number of tabs (last row may have fewer)
  // Tab row total width is CAPPED so wide blocks (4-day cities like Interlaken,
  // Rome) don't stretch tabs across the whole block. We target ~Firenze width
  // (3 days = 345px) and center the tab row horizontally inside the block.
  const MAX_TAB_ROW_W = 3 * COL_WIDTH; // 345px — same as a 3-day block (Firenze)
  const tabRowW = Math.min(b.width, MAX_TAB_ROW_W);
  const tabRowStartX = b.x + (b.width - tabRowW) / 2; // horizontal center

  tabs.forEach((tab, ti) => {
    const rowIdx = Math.floor(ti / tabsPerRow);
    const colIdx = ti % tabsPerRow;
    // How many tabs in this row?
    const tabsInThisRow = Math.min(tabsPerRow, tabs.length - rowIdx * tabsPerRow);
    const rowTotalSpace = tabRowW - (tabsInThisRow - 1) * tabGap;
    const tabW = Math.max(50, rowTotalSpace / tabsInThisRow);

    const tx = tabRowStartX + colIdx * (tabW + tabGap);
    const ty = tabY + rowIdx * (tabH + rowGap);
    const isActive = tab.id === 'schedule';

    const tabRect = createEl('rect', {
      x: tx, y: ty,
      width: tabW, height: tabH,
      fill: isActive ? '#222' : '#fff',
      stroke: '#444',
      'stroke-width': 1, rx: 10,
      style: 'cursor: pointer;',
      'data-block': b.idx,
      'data-tab': tab.id,
      'class': 'tab-btn'
    });
    svg.appendChild(tabRect);

    const tabFontSize = tabW < 55 ? 8.5 : (tabW < 70 ? 9.5 : 10);
    const tabText = createEl('text', {
      x: tx + tabW/2, y: ty + 13,
      'text-anchor': 'middle',
      'font-size': tabFontSize,
      'font-weight': isActive ? 'bold' : 'normal',
      fill: isActive ? '#fff' : '#444',
      'class': 'tab-text',
      'data-block': b.idx,
      'data-tab': tab.id,
      style: 'cursor: pointer; pointer-events: none;'
    });
    tabText.textContent = tab.label;
    svg.appendChild(tabText);
  });

  // ===== Schedule view group (default visible) =====
  const scheduleGroup = createEl('g', {
    id: `schedule-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'schedule'
  });
  svg.appendChild(scheduleGroup);

  // ===== Restaurants view group (hidden by default) =====
  const restGroup = createEl('g', {
    id: `restaurants-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'restaurants',
    style: 'display: none;'
  });
  svg.appendChild(restGroup);

  // ===== Shopping view group (hidden by default) =====
  const shopGroup = createEl('g', {
    id: `shopping-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'shopping',
    style: 'display: none;'
  });
  svg.appendChild(shopGroup);

  // ===== Groceries view group (hidden by default) =====
  const groceriesGroup = createEl('g', {
    id: `groceries-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'groceries',
    style: 'display: none;'
  });
  svg.appendChild(groceriesGroup);

  // ===== Specialties view group (hidden by default) =====
  const specialtiesGroup = createEl('g', {
    id: `specialties-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'specialties',
    style: 'display: none;'
  });
  svg.appendChild(specialtiesGroup);

  // ===== Pasta view group (hidden by default) =====
  const pastaGroup = createEl('g', {
    id: `pasta-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'pasta',
    style: 'display: none;'
  });
  svg.appendChild(pastaGroup);

  // ===== Terminal view group (hidden by default) =====
  const terminalGroup = createEl('g', {
    id: `terminal-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'terminal',
    style: 'display: none;'
  });
  svg.appendChild(terminalGroup);

  // ===== Weather view group (hidden by default) =====
  const weatherGroup = createEl('g', {
    id: `weather-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'weather',
    style: 'display: none;'
  });
  svg.appendChild(weatherGroup);

  for (let d = 1; d < b.days; d++) {
    const sepX = b.x + d * COL_WIDTH;
    scheduleGroup.appendChild(createEl('line', {
      x1: sepX, y1: b.y, x2: sepX, y2: b.y + b.height,
      stroke: '#ddd', 'stroke-width': 1,
      'stroke-dasharray': '3,3'
    }));

  for (let h = HOUR_TOP + 2; h < HOUR_BOTTOM; h += 2) {
    const gy = b.y + (h - HOUR_TOP) * HOUR_HEIGHT;
    scheduleGroup.appendChild(createEl('line', {
      x1: b.x, y1: gy, x2: b.x + b.width, y2: gy,
      stroke: '#f3f3f3', 'stroke-width': 1

  const startLbl = createEl('text', {
    x: b.x + 6, y: b.y + 12,
    'font-size': 9, fill: '#bbb'

  const endLbl = createEl('text', {
    x: b.x + b.width - 6, y: b.y + b.height - 6,
    'font-size': 9, fill: '#bbb', 'text-anchor': 'end'
  });
  endLbl.textContent = '10 PM';
  scheduleGroup.appendChild(endLbl);

  // Event notes - draw with type-based styling
  // Inline layout: time + label on the same first line. If label is too long,
  // wrap remaining words to additional lines BUT only if there's vertical room
  // before the next note. If no room, truncate the last visible line with "…".
  const MIN_LABEL_GAP = 11;     // minimum vertical px between rows
  const LINE_HEIGHT = 10;       // px between wrapped lines
  const CHAR_WIDTH = 4.5;       // approx px per char for the label font (8.5px)

  // Group by day and sort by time
  const notesByDay = {};
  b.notes.forEach(n => {
    if (!notesByDay[n.day]) notesByDay[n.day] = [];
    notesByDay[n.day].push(n);
  });
  Object.keys(notesByDay).forEach(d => {
    notesByDay[d].sort((a,c) => timeToY(a.time, 0) - timeToY(c.time, 0));
  });

  // Word-wrap helper: given a width in chars, split text into lines on word boundaries
  function wrapWords(text, maxChars) {
    if (text.length <= maxChars) return [text];
    const words = text.split(/\s+/);
    const lines = [];
    let cur = '';
    for (const w of words) {
      if (!cur) {
        cur = w;
      } else if ((cur + ' ' + w).length <= maxChars) {
        cur = cur + ' ' + w;
      } else {
        lines.push(cur);
        cur = w;
      }
      // Hard-break a single word that's longer than maxChars
      while (cur.length > maxChars) {
        lines.push(cur.substring(0, maxChars));
        cur = cur.substring(maxChars);
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  Object.keys(notesByDay).forEach(dayKey => {
    const dayNotes = notesByDay[dayKey];

    // Detect "split mode": this day has notes tagged with team A or B.
    // In split mode, team A goes on left half of column, team B on right half,
    // and untagged (common) notes use full width.
    const hasTeam = dayNotes.some(n => n.team);
    const colXBase = b.x + parseInt(dayKey) * COL_WIDTH;

    // Last-row trackers per "lane": A, B, or full (untagged)
    const laneLastY = { A: -Infinity, B: -Infinity, full: -Infinity };

    dayNotes.forEach((n, idx) => {
      const ny = timeToY(n.time, b.y);
      const lane = n.team || 'full';
      const style = noteStyle(n.type);

      // Determine x offset and width for this note
      let noteX, noteW;
      if (hasTeam && lane === 'A') {
        noteX = colXBase;
        noteW = COL_WIDTH / 2;
      } else if (hasTeam && lane === 'B') {
        noteX = colXBase + COL_WIDTH / 2;
        noteW = COL_WIDTH / 2;
      } else {
        noteX = colXBase;
        noteW = COL_WIDTH;
      }

      // Anchor line + dot at actual time
      scheduleGroup.appendChild(createEl('line', {
        x1: noteX, y1: ny,
        x2: noteX + noteW, y2: ny,
        stroke: style.color, 'stroke-width': 1, opacity: 0.5
      }));

      scheduleGroup.appendChild(createEl('circle', {
        cx: noteX + 3, cy: ny, r: 2.5, fill: style.color
      }));

      // Push down if too close to previous note in the same lane
      let rowY = ny + 8;
      if (rowY < laneLastY[lane] + MIN_LABEL_GAP) {
        rowY = laneLastY[lane] + MIN_LABEL_GAP;
      }

      // Compute time label width (used to indent the label on row 1)
      const timeWidth = n.time.length * 5.2 + 4;

      // Time label (always on the first row)
      const noteTime = createEl('text', {
        x: noteX + 6, y: rowY,
        'font-size': 9, 'font-weight': 'bold', fill: style.color
      });
      noteTime.textContent = n.time;
      scheduleGroup.appendChild(noteTime);

      // Determine vertical room: find next note in same lane
      let nextNy;
      let nextSameLane = null;
      for (let j = idx + 1; j < dayNotes.length; j++) {
        const candLane = dayNotes[j].team || 'full';
        // For "full" notes, next is the very next note (any lane).
        // For team notes, next is the next note in same lane OR any "full" note (which spans full width).
        if (lane === 'full') {
          nextSameLane = dayNotes[j];
          break;
        } else {
          if (candLane === lane || candLane === 'full') {
            nextSameLane = dayNotes[j];
            break;
          }
        }
      }
      if (nextSameLane) {
        nextNy = timeToY(nextSameLane.time, b.y);
      } else {
        nextNy = b.y + b.height;
      }
      const roomBelow = Math.max(0, nextNy - rowY - 2);
      const maxExtraLines = Math.max(0, Math.floor((roomBelow - 4) / LINE_HEIGHT));

      // Localized label and a per-language character width estimate.
      // Strip the "[team] " prefix — team is shown via the lane, not the text.
      const labelText = stripTeamPrefix(L(n, 'label'));
      const isKo = currentLang === 'ko';
      // Korean characters are roughly twice as wide as Latin chars in our font
      const charW = isKo ? 9 : CHAR_WIDTH;

      // First line uses narrow width (after time); subsequent lines use full lane width
      const firstLineMaxChars = Math.max(2, Math.floor((noteW - timeWidth - 12) / charW));
      const otherLineMaxChars = Math.max(4, Math.floor((noteW - 12) / charW));

      // Build wrapped lines: split on spaces (works for both en and ko).
      // For long unbroken Korean strings without spaces, we'll fall back to char-level wrap.
      const lines = [];
      const tokens = labelText.split(/(\s+)/).filter(t => t.length > 0);
      let cur = '';
      let onFirstLine = true;
      for (let ti = 0; ti < tokens.length; ti++) {
        const t = tokens[ti];
        if (/^\s+$/.test(t)) {
          // whitespace token - only add if we already have content on the line
          if (cur) cur = cur + ' ';
          continue;
        }
        const limit = onFirstLine ? firstLineMaxChars : otherLineMaxChars;
        const candidate = cur + t;
        if (candidate.length <= limit) {
          cur = candidate;
        } else {
          // Push the current line and start new
          if (cur.trim()) lines.push(cur.trim());
          cur = t;
          onFirstLine = false;
          // Hard-break very long words (or Korean strings without spaces)
          while (cur.length > otherLineMaxChars) {
            lines.push(cur.substring(0, otherLineMaxChars));
            cur = cur.substring(otherLineMaxChars);
          }
        }
      }
      if (cur.trim()) lines.push(cur.trim());

      // Allowed total lines = 1 (the first/inline line) + maxExtraLines
      const allowedLines = 1 + maxExtraLines;
      let visibleLines = lines.slice(0, allowedLines);

      // If we had to drop lines, append "…" to the last visible line
      if (visibleLines.length < lines.length) {
        const lastIdx = visibleLines.length - 1;
        const limit = lastIdx === 0 ? firstLineMaxChars : otherLineMaxChars;
        let lastLine = visibleLines[lastIdx];
        if (lastLine.length >= limit) {
          lastLine = lastLine.substring(0, limit - 1) + '…';
        } else {
          lastLine = lastLine + '…';
        }
        visibleLines[lastIdx] = lastLine;
      }

      // Render line 1 inline next to time
      const firstText = createEl('text', {
        x: noteX + 6 + timeWidth, y: rowY,
        'font-size': 8.5, fill: '#444'
      });
      firstText.textContent = visibleLines[0] || '';
      const tt = createEl('title');
      tt.textContent = `${n.time} — ${labelText}`;
      firstText.appendChild(tt);
      scheduleGroup.appendChild(firstText);

      // Render remaining lines below
      let bottomY = rowY;
      for (let li = 1; li < visibleLines.length; li++) {
        const lineY = rowY + li * LINE_HEIGHT;
        const wrapText = createEl('text', {
          x: noteX + 6, y: lineY,
          'font-size': 8.5, fill: '#444'
        });
        wrapText.textContent = visibleLines[li];
        const tt2 = createEl('title');
        tt2.textContent = `${n.time} — ${labelText}`;
        wrapText.appendChild(tt2);
        scheduleGroup.appendChild(wrapText);
        bottomY = lineY;
      }

      // If first line was pushed down significantly from the anchor, draw a faint connector
      if (rowY > ny + 14) {
        scheduleGroup.appendChild(createEl('line', {
          x1: noteX + 3, y1: ny + 2,
          x2: noteX + 3, y2: rowY - 3,
          stroke: style.color, 'stroke-width': 0.6,
          opacity: 0.4, 'stroke-dasharray': '2,2'
        }));
      }

      laneLastY[lane] = bottomY;
    });

    // For days that have team-tagged notes, draw a vertical separator between lanes
    // Only across the actual split time range, not the full day height.
    if (hasTeam) {
      const teamNotesInDay = dayNotes.filter(n => n.team);
      if (teamNotesInDay.length > 0) {
        const ys = teamNotesInDay.map(n => timeToY(n.time, b.y));
        const sepStartY = Math.max(b.y, Math.min(...ys) - 4);
        const sepEndY = Math.min(b.y + b.height, Math.max(...ys) + 14);
        const sepX = colXBase + COL_WIDTH / 2;
        scheduleGroup.appendChild(createEl('line', {
          x1: sepX, y1: sepStartY,
          x2: sepX, y2: sepEndY,
          stroke: '#ccc', 'stroke-width': 1,
          'stroke-dasharray': '2,3', opacity: 0.7
        }));
      }
    }
  });

  // ===== Populate Restaurants group =====
  const places = placesData[b.location] || { restaurants: [], shopping: [] };

  const restHeader = createEl('text', {

  // ===== Populate Groceries group =====

  // ===== Populate Specialties group =====

  // ===== Populate Pasta group =====
  if (places.pasta && places.pasta.length > 0) {

    places.pasta.forEach((p, i) => {

      const charPx = currentLang === 'ko' ? 9.5 : 5;

  // ===== Populate Terminal group =====
  if (places.terminals && places.terminals.length > 0) {
    const terminalHeader = createEl('text', {

    const terminalHint = createEl('text', {

    });

    places.terminals.forEach((tm, i) => {

      const tt = createEl('title');

  // ===== Populate Weather group: main + ALL stacked locations as cards =====
  const wx = weatherData[b.location];
  if (wx) {
    const cx = b.x + b.width/2;

    // Header
    const wHeader = createEl('text', {
      x: cx, y: b.y + 22,

    });
    wHeader.textContent = T().weatherHeader;
    weatherGroup.appendChild(wHeader);

    // Build the list of locations to show: main first, then each stacked spot
    const wxList = [wx.main].concat(wx.stack && wx.stack.length ? wx.stack : []);

    // Narrow blocks (1-day cities like Zurich, b.width≈115) can't fit the
    // side-by-side layout — text overlaps badly. Use a taller, single-column
    // centered layout instead, and let the card be a bit wider than the block.
    const isNarrow = b.width < 200;
    const cardW = isNarrow
      ? Math.max(b.width + 80, 190)        // wider than the narrow block
      : Math.min(b.width - 24, 300);
    const cardX = cx - cardW / 2;
    const cardH = isNarrow ? 150 : 96;
    const cardGap = 12;
    let cardY = b.y + 38;

    wxList.forEach((w, wi) => {

      // Card background

        width: cardW, height: cardH,

      });
      weatherGroup.appendChild(card);

      const pad = 14;
      const lx = cardX + pad;          // left text anchor
      const rx = cardX + cardW - pad;  // right text anchor
      const nmText = currentLang === 'ko' ? (w.name_ko || w.name) : w.name;

        // sunrise / sunset

        });

        weatherGroup.appendChild(sn2);
      } else {
      // Live / climatology badge (top-right)
      const badge = createEl('text', {
        x: rx, y: cardY + 16,
        'text-anchor': 'end',
        'font-size': 8.5, 'font-weight': 'bold', fill: '#fff'
      });

      // Location name (left)

        x: lx, y: cardY + 26,
        'font-size': isMain ? 13 : 12, 'font-weight': 'bold', fill: '#fff'
      });

      nm.textContent = nmText.length > nmMax ? nmText.substring(0, nmMax-1) + '…' : nmText;
      const nmTitle = createEl('title'); nmTitle.textContent = nmText; nm.appendChild(nmTitle);
      weatherGroup.appendChild(nm);

      // Condition (left, under name)

      });

      // Big temperature (right)

        x: rx, y: cardY + 48,
        'text-anchor': 'end',
        'font-size': 30, 'font-weight': '300', fill: '#fff'
      });

        x: rx, y: cardY + 62,

      });
      hilo.textContent = `H:${w.hi}°  L:${w.lo}°`;

      // Sunrise / sunset + timezone (bottom strip)

        'font-size': 9, fill: 'rgba(255,255,255,0.95)'
      });
      sun.textContent = `🌅 ${fmt12(w.sunrise)}   🌇 ${fmt12(w.sunset)}   🕐 ${w.tzLabel}`;
      weatherGroup.appendChild(sun);
      }

      // Visit note (if any) — small line below
      if (w.note || w.note_ko) {
        const noteTxt = currentLang === 'ko' ? (w.note_ko || w.note) : w.note;
        const noteEl = createEl('text', {
          x: cx, y: cardY + cardH + 11,
          'text-anchor': 'middle',
          'font-size': 8.5, fill: '#c0392b', 'font-weight': 'bold'
        });
        const noteMax = Math.floor((cardW) / (currentLang === 'ko' ? 9 : 5));
        noteEl.textContent = '⚠️ ' + (noteTxt.length > noteMax ? noteTxt.substring(0, noteMax-1)+'…' : noteTxt);
        const ntt = createEl('title'); ntt.textContent = noteTxt; noteEl.appendChild(ntt);

      }

  }
});

// ===== Build HTML weather galleries (iPhone-style cards + stacking) =====
function rebuildWeatherGalleries() {
  blocks.forEach(b => {
    const wx = weatherData[b.location];
    if (!wx) return;

    // Remove existing gallery if present (so we can re-render after live fetch)
    const existing = document.getElementById(`weather-gallery-${b.idx}`);
    const wasActive = existing && existing.classList.contains('active');
    if (existing) existing.remove();

    const gallery = document.createElement('div');
    gallery.className = 'rest-gallery' + (wasActive ? ' active' : '');
    gallery.id = `weather-gallery-${b.idx}`;

    // Is this city's data live or climatology fallback?
    const anyLive = (wx.main && wx.main._live) || (wx.stack && wx.stack.some(s => s._live));
    const sourceLabel = anyLive
      ? (currentLang === 'ko' ? '🟢 실시간 (Open-Meteo)' : '🟢 Live (Open-Meteo)')
      : (currentLang === 'ko' ? '⚪ 5월 말 평년값 (실시간 연결 안 됨)' : '⚪ Late-May average (live unavailable)');

    const locName = L(b, 'location');
    gallery.innerHTML = `
      <h2>${currentLang === 'ko' ? locName + ' 날씨' : 'Weather in ' + locName}</h2>
      <div class="gallery-sub">${sourceLabel} · ${currentLang === 'ko'
        ? '현지 시간대 및 일출/일몰 포함'
        : 'local timezone, sunrise & sunset'}</div>
      <div class="weather-stack"></div>
    `;
    const stackDiv = gallery.querySelector('.weather-stack');

    function weatherCard(w, isMain) {
      const name = currentLang === 'ko' ? (w.name_ko || w.name) : w.name;
      const cond = currentLang === 'ko' ? (w.cond_ko || w.cond) : w.cond;
      const note = currentLang === 'ko' ? (w.note_ko || w.note) : w.note;
      const card = document.createElement('div');
      card.className = 'weather-card' + (isMain ? ' weather-card-main' : '');

      // Per-card data-source badge
      const isLive = !!w._live;
      const badge = isLive
        ? `<span class="wx-badge wx-badge-live">🟢 ${currentLang === 'ko' ? '실시간' : 'LIVE'}</span>`
        : `<span class="wx-badge wx-badge-avg">⚪ ${currentLang === 'ko' ? '평년값' : 'AVG'}</span>`;

      let hourlyHtml = '';
      if (w.hourly && w.hourly.length) {
        hourlyHtml = '<div class="weather-hourly">' + w.hourly.map(h =>
          `<div class="weather-hour"><span class="wh-time">${h[0]}</span><span class="wh-icon">${h[2]}</span><span class="wh-temp">${h[1]}°</span></div>`
        ).join('') + '</div>';
      }

      card.innerHTML = `
        <div class="weather-card-badgerow">${badge}</div>
        <div class="weather-card-top">
          <div class="weather-card-left">
            <div class="weather-card-name">${name}</div>
            <div class="weather-card-cond">${w.icon} ${cond}</div>
            ${note ? `<div class="weather-card-note">⚠️ ${note}</div>` : ''}
          </div>
          <div class="weather-card-right">
            <div class="weather-card-temp">${w.now}°</div>
            <div class="weather-card-hilo">H:${w.hi}° &nbsp; L:${w.lo}°</div>
          </div>
        </div>
        ${hourlyHtml}
        <div class="weather-card-sun">
          <span>🌅 ${currentLang === 'ko' ? '일출' : 'Sunrise'}: <b>${fmt12(w.sunrise)}</b></span>
          <span>🌇 ${currentLang === 'ko' ? '일몰' : 'Sunset'}: <b>${fmt12(w.sunset)}</b></span>
          <span>🕐 ${w.tzLabel}</span>
        </div>
      `;
      return card;
    }

    stackDiv.appendChild(weatherCard(wx.main, true));

    if (wx.stack && wx.stack.length) {
      const stackLabel = document.createElement('div');
      stackLabel.className = 'weather-stack-label';
      stackLabel.textContent = currentLang === 'ko'
        ? '방문 지역 날씨'
        : 'Weather at places you\'ll visit';
      stackDiv.appendChild(stackLabel);
      wx.stack.forEach(s => stackDiv.appendChild(weatherCard(s, true)));
    }

    // ===== 10-day forecast (AccuWeather-style), shown BELOW the weather cards =====
    // Renders for the main location (and each stacked spot).
    // Uses live w.daily10 when available, otherwise synthesizes from climatology
    // so the forecast still shows in the sandboxed preview.
    function buildForecast(w) {
      let series = w.daily10;
      if (!series || !series.length) {
        // Synthesize a 10-day series from climatology hi/lo with mild variation,
        // starting from today's date.
        if (w.hi === undefined || w.lo === undefined) return null;
        series = [];
        const base = new Date();
        const wig = [0, 1, -1, 2, -2, 1, 0, -1, 2, -1];   // gentle hi wiggle
        for (let i = 0; i < 10; i++) {
          const dt = new Date(base.getFullYear(), base.getMonth(), base.getDate() + i);
          const y = dt.getFullYear();
          const m = String(dt.getMonth() + 1).padStart(2, '0');
          const dd = String(dt.getDate()).padStart(2, '0');
          series.push({
            date: `${y}-${m}-${dd}`,
            hi: w.hi + wig[i],
            lo: w.lo + Math.round(wig[i] / 2),
            icon: w.icon || '⛅',
            cond: w.cond || 'Partly cloudy',
            cond_ko: w.cond_ko || '구름 조금',
            pop: null
          });
        }
      }
      const wrap = document.createElement('div');
      wrap.className = 'wx-forecast';
      const wname = currentLang === 'ko' ? (w.name_ko || w.name) : w.name;
      const liveTag = w._live
        ? (currentLang === 'ko' ? '🟢 실시간' : '🟢 Live')
        : (currentLang === 'ko' ? '⚪ 평년값' : '⚪ Avg');

      // Trip date range for this block (highlight overlapping days)
      const tripSet = new Set((b.dates || []).map(ds => {
        // b.dates like "5/23 Sat" -> month/day
        const mm = ds.match(/(\d+)\/(\d+)/);
        return mm ? (parseInt(mm[1],10) + '-' + parseInt(mm[2],10)) : '';
      }).filter(Boolean));

      const dowKo = ['일','월','화','수','목','금','토'];
      const dowEn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      let rows = '';
      series.forEach((dd, i) => {
        const dt = new Date(dd.date + 'T00:00:00');
        const dow = currentLang === 'ko' ? dowKo[dt.getDay()] : dowEn[dt.getDay()];
        const md = (dt.getMonth()+1) + '/' + dt.getDate();
        const key = (dt.getMonth()+1) + '-' + dt.getDate();
        const isTrip = tripSet.has(key);
        const todayLbl = i === 0 ? (currentLang === 'ko' ? '오늘' : 'Today') : dow;
        const cond = currentLang === 'ko' ? (dd.cond_ko || dd.cond) : dd.cond;
        const popHtml = (dd.pop != null && dd.pop >= 20)
          ? `<span class="wx-fc-pop">💧${dd.pop}%</span>` : '';
        rows += `
          <div class="wx-fc-row${isTrip ? ' is-trip' : ''}">
            <div class="wx-fc-day"><span class="wx-fc-dow">${todayLbl}</span> <span class="wx-fc-date">${md}</span></div>
            <div class="wx-fc-ico">${dd.icon}</div>
            <div class="wx-fc-cond">${cond}${popHtml}</div>
            <div class="wx-fc-temps"><span class="wx-fc-hi">${dd.hi}°</span><span class="wx-fc-lo">${dd.lo}°</span></div>
          </div>`;
      });

      wrap.innerHTML = `
        <div class="wx-forecast-head">
          <span>${currentLang === 'ko' ? wname + ' · 10일 예보' : '10-Day Forecast · ' + wname}</span>
          <span class="wx-fc-sub">${liveTag} · ${currentLang === 'ko'
            ? '강조된 행 = 여행 기간' : 'highlighted = your trip dates'}</span>
        </div>
        ${rows}
        <div class="wx-fc-note">${currentLang === 'ko'
          ? '※ 실시간 데이터는 다운로드/호스팅 시 표시됩니다. 미리보기에서는 평년값일 수 있어요.'
          : '※ Live data appears when downloaded or hosted; preview may show climatology.'}</div>
      `;
      return wrap;
    }

    const mainFc = buildForecast(wx.main);
    if (mainFc) gallery.appendChild(mainFc);
    if (wx.stack && wx.stack.length) {
      wx.stack.forEach(s => {
        const fc = buildForecast(s);
        if (fc) gallery.appendChild(fc);
      });
    }

    galleryContainer.appendChild(gallery);
  });
}
rebuildWeatherGalleries();
blocks.forEach(b => {
  const restGallery = document.getElementById(`gallery-${b.idx}`);
  if (!restGallery) return;
  const hotelCard = buildHotelCard(b);
  if (hotelCard) {

    const tilesDiv = restGallery.querySelector('.rest-tiles');

      restGallery.appendChild(hotelCard);

// Bezier connections
for (let i = 0; i < blocks.length - 1; i++) {
  const from = blocks[i];
  const to = blocks[i+1];

  const sharedPeople = from.people.filter(p => to.people.includes(p));
  const leavingPeople = from.people.filter(p => !to.people.includes(p));
  const enteringPeople = to.people.filter(p => !from.people.includes(p));

  // Determine output and input Y based on actual departure / arrival times
  let outY, inY, transitInfo = null;
  const trainLabel = currentLang === 'ko' ? '기차' : 'Train';

  if (from.location === 'Zurich' && to.location === 'Interlaken') {
    outY = timeToY('4:41 PM', from.y);
    inY  = timeToY('6:59 PM', to.y);
    transitInfo = { label: trainLabel, sub: '4:41 PM → 6:59 PM' };
  } else if (from.location === 'Interlaken' && to.location === 'Grindelwald') {
    outY = timeToY('10:00 AM', from.y);
    inY  = timeToY('11:00 AM', to.y);
    transitInfo = { label: trainLabel, sub: '10:00 AM → 11:00 AM' };
  } else if (from.location === 'Grindelwald' && to.location === 'Milano') {
    outY = timeToY('1:17 PM', from.y);
    inY  = timeToY('5:50 PM', to.y);
    transitInfo = {
      label: trainLabel,
      sub: '1:17 PM → 5:50 PM',
      legs: currentLang === 'ko' ? [
        '그린델발트 13:17 → 인터라켄 오스트 13:54',
        '인터라켄 오스트 13:59 → 슈피츠 14:23',
        '슈피츠 14:38 → 브리크 15:13',
        '브리크 15:41 → 밀라노 중앙역 17:50'
      ] : [
        'Grindelwald 13:17 → Interlaken Ost 13:54',
        'Interlaken Ost 13:59 → Spiez 14:23',
        'Spiez 14:38 → Brig 15:13',
        'Brig 15:41 → Milano Centrale 17:50'
      ]
    };
  } else if (from.location === 'Milano' && to.location === 'Firenze') {
    outY = timeToY('1:10 PM', from.y);
    inY  = timeToY('3:04 PM', to.y);
    transitInfo = {
      label: trainLabel,
      sub: currentLang === 'ko' ? '1:10 PM → 3:04 PM (1시간 54분)' : '1:10 PM → 3:04 PM (1h 54m)'
    };
  } else if (from.location === 'Firenze' && to.location === 'Rome') {
    outY = timeToY('7:33 PM', from.y);
    inY  = timeToY('8:59 PM', to.y);
    transitInfo = { label: trainLabel, sub: '7:33 PM → 8:59 PM' };
  } else {
    outY = from.y + from.height/2;
    inY  = to.y + to.height/2;
  }

  // Single connection wire with group label (P1-5 / P1-3 / etc.)
  if (sharedPeople.length > 0) {
    const x1 = from.x + from.width;
    const y1 = outY;
    const x2 = to.x;
    const y2 = inY;
    const dx = (x2 - x1) * 0.5;

    // Build label - if contiguous numbered run like P1,P2,P3 -> "P1-3"
    function buildGroupLabel(people) {
      const nums = people.map(p => parseInt(p.replace('P',''))).sort((a,b)=>a-b);
      // check contiguous
      let contiguous = true;
      for (let i = 1; i < nums.length; i++) {
        if (nums[i] !== nums[i-1] + 1) { contiguous = false; break; }
      }
      if (contiguous && nums.length > 1) {
        return `P${nums[0]}-${nums[nums.length-1]}`;
      }
      if (nums.length === 1) return `P${nums[0]}`;
      return nums.map(n => `P${n}`).join(',');
    }

    const groupLabel = buildGroupLabel(sharedPeople);

    // Single bezier path - dark gray, thicker
    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`,
      stroke: '#444',
      'stroke-width': 2.5, fill: 'none', opacity: 0.9
    }));

    // Endpoint dots
    svg.appendChild(createEl('circle', {
      cx: x1, cy: y1, r: 4, fill: '#444'
    }));
    svg.appendChild(createEl('circle', {
      cx: x2, cy: y2, r: 4, fill: '#444'
    }));

    // Label on the wire (positioned at midpoint, slightly above the curve)
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;

    // Background for label readability
    const labelW = groupLabel.length * 7 + 12;
    svg.appendChild(createEl('rect', {
      x: midX - labelW/2, y: midY - 10,
      width: labelW, height: 18,
      fill: '#fff', stroke: '#444',
      'stroke-width': 1, rx: 9, opacity: 1
    }));

    const lbl = createEl('text', {
      x: midX, y: midY + 3,
      'text-anchor': 'middle',
      'font-size': 11, 'font-weight': 'bold', fill: '#222'
    });
    lbl.textContent = groupLabel;
    svg.appendChild(lbl);
  }

  if (transitInfo) {
    const midX = (from.x + from.width + to.x) / 2;
    const hasLegs = transitInfo.legs && transitInfo.legs.length > 0;
    const boxW = hasLegs ? 230 : 130;
    const boxH = hasLegs ? 32 + transitInfo.legs.length * 11 + 6 : 32;
    const midY = (outY + inY) / 2 - boxH/2;

    // Group the whole transit box so it can be toggled (hidden on Weather tab
    // for the adjacent blocks, since it overlaps the weather cards).
    const transitG = createEl('g', {
      'class': 'transit-box',
      'data-from': from.idx,
      'data-to': to.idx
    });
    svg.appendChild(transitG);

    transitG.appendChild(createEl('rect', {
      x: midX - boxW/2, y: midY,
      width: boxW, height: boxH,
      fill: '#fff', stroke: '#3498db',
      'stroke-width': 1, rx: 4, opacity: 0.97
    }));
    const t1 = createEl('text', {
      x: midX, y: midY + 14,
      'text-anchor': 'middle',
      'font-size': 10, 'font-weight': 'bold', fill: '#2980b9'
    });
    t1.textContent = transitInfo.label;
    transitG.appendChild(t1);
    const t2 = createEl('text', {
      x: midX, y: midY + 27,
      'text-anchor': 'middle',
      'font-size': 9, fill: '#555'
    });
    t2.textContent = transitInfo.sub;
    transitG.appendChild(t2);

    if (hasLegs) {
      transitInfo.legs.forEach((leg, i) => {
        const legText = createEl('text', {
          x: midX - boxW/2 + 6, y: midY + 42 + i * 11,
          'font-size': 8, fill: '#666'
        });
        legText.textContent = `• ${leg}`;
        transitG.appendChild(legText);
      });
    }
  }

  // Helper to build group label
  function buildGroupLabel2(people) {
    const nums = people.map(p => parseInt(p.replace('P',''))).sort((a,b)=>a-b);
    let contiguous = true;
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] !== nums[i-1] + 1) { contiguous = false; break; }
    }
    if (contiguous && nums.length > 1) return `P${nums[0]}-${nums[nums.length-1]}`;
    if (nums.length === 1) return `P${nums[0]}`;
    return nums.map(n => `P${n}`).join(',');
  }

  // Leaving group - single dashed curve with combined label
  if (leavingPeople.length > 0) {
    const x1 = from.x + from.width;
    const y1 = from.y + from.height - 35;
    const x2 = x1 + 60;
    const y2 = y1 + 45;

    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1+25} ${y1}, ${x2} ${y2-20}, ${x2} ${y2}`,
      stroke: '#888',
      'stroke-width': 2, fill: 'none',
      opacity: 0.7, 'stroke-dasharray': '4,3'
    }));

    const exitLabel = createEl('text', {
      x: x2 + 4, y: y2 + 4,
      'font-size': 11, 'font-weight': 'bold', fill: '#e67e22'
    });
    exitLabel.textContent = T().flyHomeBubble(buildGroupLabel2(leavingPeople));
    svg.appendChild(exitLabel);
  }

  // Entering group - single dashed curve with combined label
  if (enteringPeople.length > 0) {
    const x2 = to.x;
    const y2 = to.y + 35;
    const x1 = x2 - 60;
    const y1 = y2 - 45;

    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1} ${y1+20}, ${x2-25} ${y2}, ${x2} ${y2}`,
      stroke: '#888',
      'stroke-width': 2, fill: 'none',
      opacity: 0.7, 'stroke-dasharray': '4,3'
    }));

    const enterLabel = createEl('text', {
      x: x1 - 4, y: y1 - 2,
      'font-size': 11, 'font-weight': 'bold',
      fill: '#666', 'text-anchor': 'end'
    });
    enterLabel.textContent = T().joins(buildGroupLabel2(enteringPeople));
    svg.appendChild(enterLabel);
  }
}

function setLang(lang) {
  currentLang = lang;
  // Update page title and subtitle
  const titleEl = document.getElementById('page-title');
  const subEl = document.getElementById('page-subtitle');
  if (titleEl) titleEl.textContent = T().title;
  if (subEl) subEl.innerHTML = T().subtitle;

  const btnKo = document.getElementById('btn-ko');

  if (btnKo && btnEn) {
    btnKo.classList.toggle('active', lang === 'ko');
    btnEn.classList.toggle('active', lang === 'en');
  }
  // Re-render the SVG diagram with the new language
  buildDiagram();
  // If modal is open, refresh its content too
  const modal = document.getElementById('detail-modal-overlay');
  if (modal && modal.classList.contains('active')) {
    const idx = parseInt(modal.getAttribute('data-current-block') || '-1', 10);
    if (idx >= 0) renderDetailModal(idx);
  }
}

// ========== Detail modal ==========
function getTransitInfo(fromIdx, toIdx) {
  // Returns transit info between two blocks (by index in schedule), or null
  const from = schedule[fromIdx];
  const to = schedule[toIdx];
  if (!from || !to) return null;
  const trainLabel = currentLang === 'ko' ? '기차' : 'Train';
  const route = `${from.location}→${to.location}`;
  if (route === 'Zurich→Interlaken') return { label: trainLabel, sub: '4:41 PM → 6:59 PM', legs: [] };
  if (route === 'Interlaken→Grindelwald') return { label: trainLabel, sub: '10:00 AM → 11:00 AM', legs: [] };
  if (route === 'Grindelwald→Milano') return {
    label: trainLabel, sub: '1:17 PM → 5:50 PM',
    legs: currentLang === 'ko' ? [
      '그린델발트 13:17 → 인터라켄 오스트 13:54',
      '인터라켄 오스트 13:59 → 슈피츠 14:23',
      '슈피츠 14:38 → 브리크 15:13',
      '브리크 15:41 → 밀라노 중앙역 17:50'
    ] : [
      'Grindelwald 13:17 → Interlaken Ost 13:54',
      'Interlaken Ost 13:59 → Spiez 14:23',
      'Spiez 14:38 → Brig 15:13',
      'Brig 15:41 → Milano Centrale 17:50'
    ]
  };
  if (route === 'Milano→Firenze') return {
    label: trainLabel,
    sub: currentLang === 'ko' ? '1:10 PM → 3:04 PM (1시간 54분)' : '1:10 PM → 3:04 PM (1h 54m)',
    legs: []
  };
  if (route === 'Firenze→Rome') return { label: trainLabel, sub: '7:33 PM → 8:59 PM', legs: [] };
  return null;
}

function renderDetailModal(blockIdx) {
  const item = schedule[blockIdx];
  if (!item) return;
  const body = document.getElementById('detail-modal-body');
  const closeBtn = document.getElementById('detail-modal-close-btn');
  if (closeBtn) closeBtn.textContent = '✕ ' + T().closeBtn;

  const datesArr = L(item, 'dates') || item.dates;
  const locName = L(item, 'location');
  const hotelName = L(item, 'hotel');
  const palette = paletteFor(item.location);

  // Build header with city pastel accent band
  let html = `
    <div class="detail-modal-header" style="background: ${palette.base}; padding: 16px 20px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); border-bottom: 2px solid rgba(0,0,0,0.08);">
      <h2 class="detail-modal-title">${locName}</h2>
      <div class="detail-modal-meta">
        <span style="font-style: italic;">${hotelName}</span>
        &nbsp;·&nbsp; ${datesArr.join(' &nbsp; ')}
        &nbsp;·&nbsp; ${item.people.join(', ')}
      </div>
    </div>
  `;

  // Inbound transit (if any)
  const inbound = blockIdx > 0 ? getTransitInfo(blockIdx - 1, blockIdx) : null;
  if (inbound) {
    const fromLoc = L(schedule[blockIdx - 1], 'location');
    html += `
      <div class="detail-transit">
        <div class="transit-label">${T().arriveLabel}: ${fromLoc} → ${locName} (${inbound.label}, ${inbound.sub})</div>
        ${inbound.legs.map(leg => `<div class="transit-leg">• ${leg}</div>`).join('')}
      </div>
    `;
  }

  // Group notes by day
  const notesByDay = {};
  item.notes.forEach(n => {
    if (!notesByDay[n.day]) notesByDay[n.day] = [];
    notesByDay[n.day].push(n);
  });

  // Sort each day chronologically
  Object.keys(notesByDay).forEach(d => {
    notesByDay[d].sort((a, b) => timeToY(a.time, 0) - timeToY(b.time, 0));
  });

  // Render each day with zebra
  for (let d = 0; d < item.days; d++) {
    const dayNotes = notesByDay[d] || [];
    const dateStr = datesArr[d] || '';
    const isOdd = d % 2 === 1;
    const dayBg = isOdd ? palette.zebra[1] : palette.base;
    html += `<div class="detail-day" style="background: ${dayBg}; border-radius: 6px; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.04);">`;
    html += `<div class="detail-day-header">${dateStr}</div>`;
    if (dayNotes.length === 0) {
      html += `<div style="color: #999; padding: 8px 12px; font-size: 13px;">—</div>`;
    } else {
      const hasTeam = dayNotes.some(n => n.team);
      if (hasTeam) {
        // Split into shared / team A / team B
        const shared = dayNotes.filter(n => !n.team);
        const teamA = dayNotes.filter(n => n.team === 'A');
        const teamB = dayNotes.filter(n => n.team === 'B');
        // Derive friendly team titles from the first team note's label prefix
        function teamTitle(arr, fallback) {
          if (!arr.length) return fallback;
          const lab = L(arr[0], 'label');
          const m = lab.match(/^\[([^\]]+)\]/);
          return m ? m[1] : fallback;
        }
        const titleA = teamTitle(teamA, currentLang === 'ko' ? '패러팀' : 'Paraglide team');
        const titleB = teamTitle(teamB, currentLang === 'ko' ? '툰팀' : 'Thun team');

        function renderRows(arr) {
          return arr.map(n => {
            const type = n.type || 'other';
            const icon = eventTypeIcon(n.type);
            const labelText = stripTeamPrefix(L(n, 'label'));
            return `
              <div class="detail-event ${type}">
                <div class="detail-event-time">${n.time}</div>
                <div class="detail-event-icon">${icon}</div>
                <div class="detail-event-label">${labelText}</div>
              </div>`;
          }).join('');
        }
        // Shared events first (in chronological order, before the split)
        const splitStart = Math.min(
          teamA.length ? dayNotes.indexOf(teamA[0]) : 1e9,
          teamB.length ? dayNotes.indexOf(teamB[0]) : 1e9
        );
        const sharedBefore = shared.filter(n => dayNotes.indexOf(n) < splitStart);
        const sharedAfter  = shared.filter(n => dayNotes.indexOf(n) >= splitStart);
        if (sharedBefore.length) html += renderRows(sharedBefore);
        html += `
          <div class="detail-team-cols">
            <div class="detail-team-col">
              <div class="detail-team-title detail-team-title-a">${titleA}</div>
              ${renderRows(teamA)}
            </div>
            <div class="detail-team-col">
              <div class="detail-team-title detail-team-title-b">${titleB}</div>
              ${renderRows(teamB)}
            </div>
          </div>
        `;
        if (sharedAfter.length) html += renderRows(sharedAfter);
      } else {
        dayNotes.forEach(n => {
          const type = n.type || 'other';
          const icon = eventTypeIcon(n.type);
          const labelText = stripTeamPrefix(L(n, 'label'));
          html += `
            <div class="detail-event ${type}">
              <div class="detail-event-time">${n.time}</div>
              <div class="detail-event-icon">${icon}</div>
              <div class="detail-event-label">${labelText}</div>
            </div>
          `;
        });
      }
    }
    html += `</div>`;
  }

  // Outbound transit (if any)
  const outbound = blockIdx < schedule.length - 1 ? getTransitInfo(blockIdx, blockIdx + 1) : null;
  if (outbound) {
    const toLoc = L(schedule[blockIdx + 1], 'location');
    html += `
      <div class="detail-transit">
        <div class="transit-label">${T().departLabel}: ${locName} → ${toLoc} (${outbound.label}, ${outbound.sub})</div>
        ${outbound.legs.map(leg => `<div class="transit-leg">• ${leg}</div>`).join('')}
      </div>
    `;
  }

  body.innerHTML = html;
}

// Allow ESC key to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('detail-modal-overlay');
    if (modal && modal.classList.contains('active')) closeDetail();
    const mapModal = document.getElementById('map-modal-overlay');
    if (mapModal && mapModal.classList.contains('active')) closeMapModal();
  }
});

// ===== Map modal =====
let leafletMapInstance = null;

function openMapModal(blockIdx) {
  const modal = document.getElementById('map-modal-overlay');
  modal.setAttribute('data-current-block', String(blockIdx));
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  // Use setTimeout so the modal renders before Leaflet tries to size itself
  setTimeout(() => renderMapModal(blockIdx), 50);
}

function closeMapModal() {
  const modal = document.getElementById('map-modal-overlay');
  modal.classList.remove('active');
  document.body.style.overflow = '';
  // Clean up the map so it can re-initialize next time
  if (leafletMapInstance) {
    leafletMapInstance.remove();
    leafletMapInstance = null;
  }
}

function closeMapIfBackdrop(event) {
  if (event.target.id === 'map-modal-overlay') closeMapModal();
}

function renderMapModal(blockIdx) {
  const block = schedule[blockIdx];
  if (!block) return;
  const places = placesData[block.location] || {};
  const locName = L(block, 'location');

  // Update title
  document.getElementById('map-modal-title').textContent = `🗺️ ${locName}`;

  // Collect all places with coords + category
  const points = [];
  function pushItems(arr, category) {
    if (!arr) return;
    arr.forEach(item => {
      const coords = getCoords(item);
      if (!coords) return; // skip items without known coords
      const name = (currentLang === 'ko' && item.name_ko) ? item.name_ko : item.name;
      const desc = (currentLang === 'ko' && item.desc_ko) ? item.desc_ko : (item.desc || '');
      points.push({ coords, name, desc, link: item.link, category });
    });
  }
  // Hotel goes first (from hotelInfo on schedule item)
  if (block.hotelInfo) {
    const coords = getCoords(block.hotelInfo);
    if (coords) {
      const hname = L(block, 'hotel');
      const hdesc = (currentLang === 'ko' && block.hotelInfo.desc_ko) ? block.hotelInfo.desc_ko : block.hotelInfo.desc;
      points.push({ coords, name: hname, desc: hdesc, link: block.hotelInfo.link, category: 'hotel' });
    }
  }
  pushItems(places.restaurants,  'restaurant');
  pushItems(places.groceries,    'grocery');
  pushItems(places.specialties,  'specialty');
  pushItems(places.pasta,        'pasta');
  pushItems(places.terminals,    'terminal');

  // Build legend (only show categories that have at least one pinned item)
  const presentCats = new Set(points.map(p => p.category));
  const legendDiv = document.getElementById('map-legend');
  legendDiv.innerHTML = '';
  Object.keys(categoryStyles).forEach(cat => {
    if (!presentCats.has(cat)) return;
    const s = categoryStyles[cat];
    const item = document.createElement('span');
    item.className = 'map-legend-item';
    item.innerHTML = `<span class="map-legend-dot" style="background: ${s.color};"></span>${s.emoji} ${currentLang === 'ko' ? s.label_ko : s.label_en}`;
    legendDiv.appendChild(item);
  });

  // Build Google Maps "search all" URL — opens a Google Maps search showing all points
  // Use a multi-stop directions URL since Google Maps URLs API doesn't support multi-marker easily
  const googleUrl = buildGoogleMapsUrl(locName, points);
  document.getElementById('map-modal-google').href = googleUrl;

  // Initialize Leaflet
  if (leafletMapInstance) {
    leafletMapInstance.remove();
    leafletMapInstance = null;
  }
  const center = cityCenters[block.location] || [points[0]?.coords[0] || 0, points[0]?.coords[1] || 0];
  leafletMapInstance = L.map('map-canvas', {
    zoomControl: true,
    scrollWheelZoom: true
  }).setView(center, 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(leafletMapInstance);

  // Add a custom pin per point
  const markerBounds = [];
  points.forEach((p, i) => {
    const style = categoryStyles[p.category] || categoryStyles.restaurant;
    const icon = L.divIcon({
      className: 'custom-pin-wrapper',
      html: `<div class="custom-pin" style="color: ${style.color};">
               <div class="custom-pin-body" style="background: ${style.color}; color: #fff;">${style.emoji}</div>
               <div class="custom-pin-tip"></div>
             </div>`,
      iconSize: [28, 36],
      iconAnchor: [14, 36],
      popupAnchor: [0, -32]
    });
    const marker = L.marker(p.coords, { icon }).addTo(leafletMapInstance);
    const linkHtml = p.link ? `<br><a href="${p.link}" target="_blank" rel="noopener">📍 Google Maps</a>` : '';
    const catLabel = currentLang === 'ko' ? style.label_ko : style.label_en;
    marker.bindPopup(`
      <div style="max-width: 260px;">
        <div style="font-size: 10px; color: ${style.color}; font-weight: bold; text-transform: uppercase; margin-bottom: 4px;">${style.emoji} ${catLabel}</div>
        <div style="font-weight: bold; font-size: 14px; margin-bottom: 4px;">${p.name}</div>
        ${p.desc ? `<div style="font-size: 12px; color: #555; line-height: 1.4;">${p.desc.length > 200 ? p.desc.substring(0, 200) + '…' : p.desc}</div>` : ''}
        ${linkHtml}
      </div>
    `);
    markerBounds.push(p.coords);
  });

  // Fit map to all markers
  if (markerBounds.length > 1) {
    leafletMapInstance.fitBounds(markerBounds, { padding: [40, 40] });
  } else if (markerBounds.length === 1) {
    leafletMapInstance.setView(markerBounds[0], 15);
  }
}

// Build a Google Maps URL that opens a search for the city with all locations visible
function buildGoogleMapsUrl(locName, points) {
  // The most reliable Google Maps multi-marker approach is the "dir" (directions) URL.
  // But that forces a route. A simpler approach: open a "search" URL centered on the city.
  // For multiple custom markers, Google Maps doesn't offer a public ad-hoc URL.
  // Fallback: just open Google Maps centered on the city.
  if (points.length === 0) {
    return `https://www.google.com/maps/search/${encodeURIComponent(locName)}`;
  }
  // Center the search on the average of all points
  const avgLat = points.reduce((s, p) => s + p.coords[0], 0) / points.length;
  const avgLng = points.reduce((s, p) => s + p.coords[1], 0) / points.length;
  return `https://www.google.com/maps/search/${encodeURIComponent(locName)}/@${avgLat},${avgLng},14z`;
}

// Initial render (Korean is the default)
buildDiagram();

// Attempt live weather in the background (Open-Meteo, no key/signup).
// On failure (e.g. sandboxed preview), the climatology fallback stays.
window.addEventListener('load', () => {
  setTimeout(() => { refreshAllWeather(); }, 800);
});

</script>
