// ========== Language state & helpers ==========
let currentLang = 'ko'; // default to Korean

// Get the right text from an item, falling back to English when no translation exists
function L(item, field) {
  if (currentLang === 'ko') {
    const koVal = item[field + '_ko'];
    if (koVal !== undefined && koVal !== null && koVal !== '') return koVal;
  }
  return item[field];
}

// Get a localized string from a {en, ko} object or from a plain string
function LS(item) {
  if (typeof item === 'string') return item;
  if (item && typeof item === 'object') {
    if (currentLang === 'ko' && item.ko) return item.ko;
    if (item.en) return item.en;
  }
  return '';
}

// Module-scope helpers (accessible from modal functions too)
const blocks = [];

function createEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function timeToY(timeStr, blockY) {
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return blockY;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const totalHours = h + min/60;
  return blockY + (totalHours - HOUR_TOP) * HOUR_HEIGHT;
}

function noteStyle(type) {
  if (type === 'checkin')   return { color: '#27ae60', label: '✓ IN' };
  if (type === 'checkout')  return { color: '#c0392b', label: '✗ OUT' };
  if (type === 'excursion') return { color: '#8e44ad', label: '★' };
  if (type === 'flight')    return { color: '#e67e22', label: '✈' };
  return { color: '#2980b9', label: '' };
}

function buildDiagram() {
  // Clear existing SVG content (keep <defs>)
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  // Re-insert defs
  const defs = document.createElementNS(SVG_NS, 'defs');
  defs.innerHTML = `
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>`;
  svg.appendChild(defs);

  // Reset blocks array
  blocks.length = 0;
  let currentX = BLOCK_X_START;

  schedule.forEach((item, idx) => {
    const width = COL_WIDTH * item.days;
    blocks.push({
      ...item, idx,
      x: currentX, y: BLOCK_Y,
      width: width, height: BLOCK_HEIGHT
    });
    currentX += width + BLOCK_GAP;
  });

  svg.setAttribute('width', currentX + 180);
  svg.setAttribute('height', BLOCK_Y + BLOCK_HEIGHT + 130);

// Time axis
const axisX = 50;
for (let h = HOUR_TOP; h <= HOUR_BOTTOM; h += 2) {
  const y = BLOCK_Y + (h - HOUR_TOP) * HOUR_HEIGHT;
  const label = createEl('text', {
    x: axisX, y: y + 4,
    'text-anchor': 'end',
    'font-size': 10, fill: '#888'
  });
  const hr12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const ampm = h >= 12 ? 'PM' : 'AM';
  label.textContent = `${hr12}${ampm}`;
  svg.appendChild(label);
}

// Draw blocks
blocks.forEach((b) => {
  const datesArr = L(b, 'dates') || b.dates;
  for (let d = 0; d < b.days; d++) {
    const dateLabel = createEl('text', {
      x: b.x + d * COL_WIDTH + COL_WIDTH/2,
      y: b.y - 16,
      'text-anchor': 'middle',
      'font-size': 11, fill: '#666',
      'font-weight': 'bold'
    });
    dateLabel.textContent = datesArr[d] || '';
    svg.appendChild(dateLabel);
  }

  const locLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 100,
    'text-anchor': 'middle',
    'font-size': 17, 'font-weight': 'bold', fill: '#222'
  });
  locLabel.textContent = L(b, 'location');
  svg.appendChild(locLabel);

  const hotelLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 84,
    'text-anchor': 'middle',
    'font-size': 11, 'font-style': 'italic', fill: '#777'
  });
  hotelLabel.textContent = L(b, 'hotel');
  svg.appendChild(hotelLabel);

  const peopleLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 68,
    'text-anchor': 'middle',
    'font-size': 10, fill: '#999'
  });
  peopleLabel.textContent = b.people.join(', ');
  svg.appendChild(peopleLabel);

  // ===== "Details" badge: clickable, opens fullscreen modal =====
  const badgeLabel = T().detailsBadge;
  const badgeW = currentLang === 'ko' ? 52 : 60;
  const badgeH = 18;
  const badgeX = b.x + b.width/2 - badgeW/2;
  const badgeY = b.y - 30;

  const badgeRect = createEl('rect', {
    x: badgeX, y: badgeY,
    width: badgeW, height: badgeH,
    fill: '#fff7e6', stroke: '#e67e22',
    'stroke-width': 1.2, rx: 9,
    style: 'cursor: pointer;',
    'data-detail-block': b.idx,
    'class': 'detail-badge'
  });
  svg.appendChild(badgeRect);

  const badgeText = createEl('text', {
    x: badgeX + badgeW/2, y: badgeY + 13,
    'text-anchor': 'middle',
    'font-size': 10, 'font-weight': 'bold', fill: '#d35400',
    style: 'cursor: pointer; pointer-events: none;'
  });
  badgeText.textContent = '🔍 ' + badgeLabel;
  svg.appendChild(badgeText);

  const rect = createEl('rect', {
    x: b.x, y: b.y,
    width: b.width, height: b.height,
    fill: '#ffffff', stroke: '#444',
    'stroke-width': 1.5, rx: 6,
    filter: 'url(#shadow)'
  });
  svg.appendChild(rect);

  // ===== Tab badges (Schedule / Restaurants / Shopping) =====
  // Place them between people row and date row, above the block
  const tabY = b.y - 48;
  const tabH = 18;
  const tabGap = 4;
  const tabs = [
    { id: 'schedule',    label: T().schedule },
    { id: 'restaurants', label: T().restaurants },
    { id: 'shopping',    label: T().shopping }
  ];

  // Calculate tab widths so all 3 fit within block width
  const totalTabSpace = b.width - (tabs.length - 1) * tabGap;
  const tabW = Math.max(60, totalTabSpace / tabs.length);

  tabs.forEach((tab, ti) => {
    const tx = b.x + ti * (tabW + tabGap);
    const isActive = tab.id === 'schedule';

    const tabRect = createEl('rect', {
      x: tx, y: tabY,
      width: tabW, height: tabH,
      fill: isActive ? '#222' : '#fff',
      stroke: '#444',
      'stroke-width': 1, rx: 10,
      style: 'cursor: pointer;',
      'data-block': b.idx,
      'data-tab': tab.id,
      'class': 'tab-btn'
    });
    svg.appendChild(tabRect);

    const tabText = createEl('text', {
      x: tx + tabW/2, y: tabY + 13,
      'text-anchor': 'middle',
      'font-size': 10,
      'font-weight': isActive ? 'bold' : 'normal',
      fill: isActive ? '#fff' : '#444',
      'class': 'tab-text',
      'data-block': b.idx,
      'data-tab': tab.id,
      style: 'cursor: pointer; pointer-events: none;'
    });
    tabText.textContent = tab.label;
    svg.appendChild(tabText);
  });

  // ===== Schedule view group (default visible) =====
  const scheduleGroup = createEl('g', {
    id: `schedule-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'schedule'
  });
  svg.appendChild(scheduleGroup);

  // ===== Restaurants view group (hidden by default) =====
  const restGroup = createEl('g', {
    id: `restaurants-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'restaurants',
    style: 'display: none;'
  });
  svg.appendChild(restGroup);

  // ===== Shopping view group (hidden by default) =====
  const shopGroup = createEl('g', {
    id: `shopping-${b.idx}`,
    'data-block': b.idx,
    'data-view': 'shopping',
    style: 'display: none;'
  });
  svg.appendChild(shopGroup);

  for (let d = 1; d < b.days; d++) {
    const sepX = b.x + d * COL_WIDTH;
    scheduleGroup.appendChild(createEl('line', {
      x1: sepX, y1: b.y, x2: sepX, y2: b.y + b.height,
      stroke: '#ddd', 'stroke-width': 1,
      'stroke-dasharray': '3,3'
    }));
  }

  for (let h = HOUR_TOP + 2; h < HOUR_BOTTOM; h += 2) {
    const gy = b.y + (h - HOUR_TOP) * HOUR_HEIGHT;
    scheduleGroup.appendChild(createEl('line', {
      x1: b.x, y1: gy, x2: b.x + b.width, y2: gy,
      stroke: '#f3f3f3', 'stroke-width': 1
    }));
  }

  const startLbl = createEl('text', {
    x: b.x + 6, y: b.y + 12,
    'font-size': 9, fill: '#bbb'
  });
  startLbl.textContent = '6 AM';
  scheduleGroup.appendChild(startLbl);

  const endLbl = createEl('text', {
    x: b.x + b.width - 6, y: b.y + b.height - 6,
    'font-size': 9, fill: '#bbb', 'text-anchor': 'end'
  });
  endLbl.textContent = '10 PM';
  scheduleGroup.appendChild(endLbl);

  // Event notes - draw with type-based styling
  // Inline layout: time + label on the same first line. If label is too long,
  // wrap remaining words to additional lines BUT only if there's vertical room
  // before the next note. If no room, truncate the last visible line with "…".
  const MIN_LABEL_GAP = 11;     // minimum vertical px between rows
  const LINE_HEIGHT = 10;       // px between wrapped lines
  const CHAR_WIDTH = 4.5;       // approx px per char for the label font (8.5px)

  // Group by day and sort by time
  const notesByDay = {};
  b.notes.forEach(n => {
    if (!notesByDay[n.day]) notesByDay[n.day] = [];
    notesByDay[n.day].push(n);
  });
  Object.keys(notesByDay).forEach(d => {
    notesByDay[d].sort((a,c) => timeToY(a.time, 0) - timeToY(c.time, 0));
  });

  // Word-wrap helper: given a width in chars, split text into lines on word boundaries
  function wrapWords(text, maxChars) {
    if (text.length <= maxChars) return [text];
    const words = text.split(/\s+/);
    const lines = [];
    let cur = '';
    for (const w of words) {
      if (!cur) {
        cur = w;
      } else if ((cur + ' ' + w).length <= maxChars) {
        cur = cur + ' ' + w;
      } else {
        lines.push(cur);
        cur = w;
      }
      // Hard-break a single word that's longer than maxChars
      while (cur.length > maxChars) {
        lines.push(cur.substring(0, maxChars));
        cur = cur.substring(maxChars);
      }
    }
    if (cur) lines.push(cur);
    return lines;
  }

  Object.keys(notesByDay).forEach(dayKey => {
    const dayNotes = notesByDay[dayKey];
    let lastRowBottomY = -Infinity; // y position of bottom-most line of previous note

    dayNotes.forEach((n, idx) => {
      const ny = timeToY(n.time, b.y);
      const colX = b.x + n.day * COL_WIDTH;
      const style = noteStyle(n.type);

      // Anchor line + dot always at the actual time
      scheduleGroup.appendChild(createEl('line', {
        x1: colX, y1: ny,
        x2: colX + COL_WIDTH, y2: ny,
        stroke: style.color, 'stroke-width': 1, opacity: 0.5
      }));

      scheduleGroup.appendChild(createEl('circle', {
        cx: colX + 3, cy: ny, r: 2.5, fill: style.color
      }));

      // First-row position: ideally just below the anchor line.
      // Push down if too close to the previous note's bottom line.
      let rowY = ny + 8;
      if (rowY < lastRowBottomY + MIN_LABEL_GAP) {
        rowY = lastRowBottomY + MIN_LABEL_GAP;
      }

      // Compute time label width (used to indent the label on row 1)
      const timeWidth = n.time.length * 5.2 + 4;

      // Time label (always on the first row)
      const noteTime = createEl('text', {
        x: colX + 8, y: rowY,
        'font-size': 9, 'font-weight': 'bold', fill: style.color
      });
      noteTime.textContent = n.time;
      scheduleGroup.appendChild(noteTime);

      // Determine vertical room for label lines.
      // Find next note's anchor (or block bottom) to decide how many extra lines fit.
      let nextNy;
      if (idx + 1 < dayNotes.length) {
        nextNy = timeToY(dayNotes[idx + 1].time, b.y);
      } else {
        nextNy = b.y + b.height;
      }
      // Available room below rowY before bumping into next note
      const roomBelow = Math.max(0, nextNy - rowY - 2);
      // Max wrapped lines we can show (first line is always shown; extras go below)
      const maxExtraLines = Math.max(0, Math.floor((roomBelow - 4) / LINE_HEIGHT));

      // Localized label and a per-language character width estimate
      const labelText = L(n, 'label');
      const isKo = currentLang === 'ko';
      // Korean characters are roughly twice as wide as Latin chars in our font
      const charW = isKo ? 9 : CHAR_WIDTH;

      // First line uses narrow width (after time); subsequent lines use full column width
      const firstLineMaxChars = Math.max(2, Math.floor((COL_WIDTH - timeWidth - 14) / charW));
      const otherLineMaxChars = Math.max(4, Math.floor((COL_WIDTH - 14) / charW));

      // Build wrapped lines: split on spaces (works for both en and ko).
      // For long unbroken Korean strings without spaces, we'll fall back to char-level wrap.
      const lines = [];
      const tokens = labelText.split(/(\s+)/).filter(t => t.length > 0);
      let cur = '';
      let onFirstLine = true;
      for (let ti = 0; ti < tokens.length; ti++) {
        const t = tokens[ti];
        if (/^\s+$/.test(t)) {
          // whitespace token - only add if we already have content on the line
          if (cur) cur = cur + ' ';
          continue;
        }
        const limit = onFirstLine ? firstLineMaxChars : otherLineMaxChars;
        const candidate = cur + t;
        if (candidate.length <= limit) {
          cur = candidate;
        } else {
          // Push the current line and start new
          if (cur.trim()) lines.push(cur.trim());
          cur = t;
          onFirstLine = false;
          // Hard-break very long words (or Korean strings without spaces)
          while (cur.length > otherLineMaxChars) {
            lines.push(cur.substring(0, otherLineMaxChars));
            cur = cur.substring(otherLineMaxChars);
          }
        }
      }
      if (cur.trim()) lines.push(cur.trim());

      // Allowed total lines = 1 (the first/inline line) + maxExtraLines
      const allowedLines = 1 + maxExtraLines;
      let visibleLines = lines.slice(0, allowedLines);

      // If we had to drop lines, append "…" to the last visible line
      if (visibleLines.length < lines.length) {
        const lastIdx = visibleLines.length - 1;
        const limit = lastIdx === 0 ? firstLineMaxChars : otherLineMaxChars;
        let lastLine = visibleLines[lastIdx];
        if (lastLine.length >= limit) {
          lastLine = lastLine.substring(0, limit - 1) + '…';
        } else {
          lastLine = lastLine + '…';
        }
        visibleLines[lastIdx] = lastLine;
      }

      // Render line 1 inline next to time
      const firstText = createEl('text', {
        x: colX + 8 + timeWidth, y: rowY,
        'font-size': 8.5, fill: '#444'
      });
      firstText.textContent = visibleLines[0] || '';
      const tt = createEl('title');
      tt.textContent = `${n.time} — ${labelText}`;
      firstText.appendChild(tt);
      scheduleGroup.appendChild(firstText);

      // Render remaining lines below, full column width
      let bottomY = rowY;
      for (let li = 1; li < visibleLines.length; li++) {
        const lineY = rowY + li * LINE_HEIGHT;
        const wrapText = createEl('text', {
          x: colX + 8, y: lineY,
          'font-size': 8.5, fill: '#444'
        });
        wrapText.textContent = visibleLines[li];
        const tt2 = createEl('title');
        tt2.textContent = `${n.time} — ${labelText}`;
        wrapText.appendChild(tt2);
        scheduleGroup.appendChild(wrapText);
        bottomY = lineY;
      }

      // If first line was pushed down significantly from the anchor, draw a faint connector
      if (rowY > ny + 14) {
        scheduleGroup.appendChild(createEl('line', {
          x1: colX + 3, y1: ny + 2,
          x2: colX + 3, y2: rowY - 3,
          stroke: style.color, 'stroke-width': 0.6,
          opacity: 0.4, 'stroke-dasharray': '2,2'
        }));
      }

      lastRowBottomY = bottomY;
    });
  });

  // ===== Populate Restaurants group =====
  const places = placesData[b.location] || { restaurants: [], shopping: [] };

  const restHeader = createEl('text', {
    x: b.x + b.width/2, y: b.y + 26,
    'text-anchor': 'middle',
    'font-size': 12, 'font-weight': 'bold', fill: '#c0392b'
  });
  restHeader.textContent = T().restaurantsHeader;
  restGroup.appendChild(restHeader);

  // Check if any restaurant is an object with rich format (has 'name' field)
  const hasRichRestaurants = places.restaurants.some(r => typeof r === 'object' && r.name);

  if (hasRichRestaurants) {
    // Show a hint text inside the small SVG block; full tile view renders as HTML overlay
    const hint = createEl('text', {
      x: b.x + b.width/2, y: b.y + 50,
      'text-anchor': 'middle',
      'font-size': 10, fill: '#666'
    });
    hint.textContent = T().morePicks(places.restaurants.length);
    restGroup.appendChild(hint);

    // List restaurant names compactly
    places.restaurants.forEach((r, i) => {
      const ry = b.y + 75 + i * 18;
      if (ry > b.y + b.height - 20) return; // skip if overflow
      const txt = createEl('text', {
        x: b.x + 10, y: ry,
        'font-size': 9, fill: '#444'
      });
      const rname = (currentLang === 'ko' && r.name_ko) ? r.name_ko : r.name;
      txt.textContent = `${i+1}. ${rname}`;
      restGroup.appendChild(txt);
    });
  } else {
    places.restaurants.forEach((r, i) => {
      const ry = b.y + 60 + i * 32;
      restGroup.appendChild(createEl('rect', {
        x: b.x + 8, y: ry - 12,
        width: b.width - 16, height: 26,
        fill: '#fdf2f0', stroke: '#e8c5be',
        'stroke-width': 1, rx: 4
      }));
      const rTxt = createEl('text', {
        x: b.x + 14, y: ry + 4,
        'font-size': 9.5, fill: '#333'
      });
      // Korean text needs more width per char
      const charPx = currentLang === 'ko' ? 9.5 : 5;
      const maxChars = Math.floor((b.width - 24) / charPx);
      const fullTxt = LS(r);
      rTxt.textContent = fullTxt.length > maxChars ? fullTxt.substring(0, maxChars - 1) + '…' : fullTxt;
      const title = createEl('title');
      title.textContent = fullTxt;
      rTxt.appendChild(title);
      restGroup.appendChild(rTxt);
    });
  }

  // ===== Populate Shopping group =====
  const shopHeader = createEl('text', {
    x: b.x + b.width/2, y: b.y + 26,
    'text-anchor': 'middle',
    'font-size': 12, 'font-weight': 'bold', fill: '#8e44ad'
  });
  shopHeader.textContent = T().shoppingHeader;
  shopGroup.appendChild(shopHeader);

  places.shopping.forEach((s, i) => {
    const sy = b.y + 60 + i * 32;
    shopGroup.appendChild(createEl('rect', {
      x: b.x + 8, y: sy - 12,
      width: b.width - 16, height: 26,
      fill: '#f6f0fa', stroke: '#d6c5e0',
      'stroke-width': 1, rx: 4
    }));
    const sTxt = createEl('text', {
      x: b.x + 14, y: sy + 4,
      'font-size': 9.5, fill: '#333'
    });
    const charPx = currentLang === 'ko' ? 9.5 : 5;
    const maxChars = Math.floor((b.width - 24) / charPx);
    const fullTxt = LS(s);
    sTxt.textContent = fullTxt.length > maxChars ? fullTxt.substring(0, maxChars - 1) + '…' : fullTxt;
    const title = createEl('title');
    title.textContent = fullTxt;
    sTxt.appendChild(title);
    shopGroup.appendChild(sTxt);
  });
});

// Bezier connections
for (let i = 0; i < blocks.length - 1; i++) {
  const from = blocks[i];
  const to = blocks[i+1];

  const sharedPeople = from.people.filter(p => to.people.includes(p));
  const leavingPeople = from.people.filter(p => !to.people.includes(p));
  const enteringPeople = to.people.filter(p => !from.people.includes(p));

  // Determine output and input Y based on actual departure / arrival times
  let outY, inY, transitInfo = null;
  const trainLabel = currentLang === 'ko' ? '기차' : 'Train';

  if (from.location === 'Zurich' && to.location === 'Interlaken') {
    outY = timeToY('4:41 PM', from.y);
    inY  = timeToY('6:59 PM', to.y);
    transitInfo = { label: trainLabel, sub: '4:41 PM → 6:59 PM' };
  } else if (from.location === 'Interlaken' && to.location === 'Grindelwald') {
    outY = timeToY('10:00 AM', from.y);
    inY  = timeToY('11:00 AM', to.y);
    transitInfo = { label: trainLabel, sub: '10:00 AM → 11:00 AM' };
  } else if (from.location === 'Grindelwald' && to.location === 'Milano') {
    outY = timeToY('1:17 PM', from.y);
    inY  = timeToY('5:50 PM', to.y);
    transitInfo = {
      label: trainLabel,
      sub: '1:17 PM → 5:50 PM',
      legs: currentLang === 'ko' ? [
        '그린델발트 13:17 → 인터라켄 오스트 13:54',
        '인터라켄 오스트 13:59 → 슈피츠 14:23',
        '슈피츠 14:38 → 브리크 15:13',
        '브리크 15:41 → 밀라노 중앙역 17:50'
      ] : [
        'Grindelwald 13:17 → Interlaken Ost 13:54',
        'Interlaken Ost 13:59 → Spiez 14:23',
        'Spiez 14:38 → Brig 15:13',
        'Brig 15:41 → Milano Centrale 17:50'
      ]
    };
  } else if (from.location === 'Milano' && to.location === 'Firenze') {
    outY = timeToY('1:10 PM', from.y);
    inY  = timeToY('3:04 PM', to.y);
    transitInfo = {
      label: trainLabel,
      sub: currentLang === 'ko' ? '1:10 PM → 3:04 PM (1시간 54분)' : '1:10 PM → 3:04 PM (1h 54m)'
    };
  } else if (from.location === 'Firenze' && to.location === 'Rome') {
    outY = timeToY('7:33 PM', from.y);
    inY  = timeToY('8:59 PM', to.y);
    transitInfo = { label: trainLabel, sub: '7:33 PM → 8:59 PM' };
  } else {
    outY = from.y + from.height/2;
    inY  = to.y + to.height/2;
  }

  // Single connection wire with group label (P1-5 / P1-3 / etc.)
  if (sharedPeople.length > 0) {
    const x1 = from.x + from.width;
    const y1 = outY;
    const x2 = to.x;
    const y2 = inY;
    const dx = (x2 - x1) * 0.5;

    // Build label - if contiguous numbered run like P1,P2,P3 -> "P1-3"
    function buildGroupLabel(people) {
      const nums = people.map(p => parseInt(p.replace('P',''))).sort((a,b)=>a-b);
      // check contiguous
      let contiguous = true;
      for (let i = 1; i < nums.length; i++) {
        if (nums[i] !== nums[i-1] + 1) { contiguous = false; break; }
      }
      if (contiguous && nums.length > 1) {
        return `P${nums[0]}-${nums[nums.length-1]}`;
      }
      if (nums.length === 1) return `P${nums[0]}`;
      return nums.map(n => `P${n}`).join(',');
    }

    const groupLabel = buildGroupLabel(sharedPeople);

    // Single bezier path - dark gray, thicker
    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`,
      stroke: '#444',
      'stroke-width': 2.5, fill: 'none', opacity: 0.9
    }));

    // Endpoint dots
    svg.appendChild(createEl('circle', {
      cx: x1, cy: y1, r: 4, fill: '#444'
    }));
    svg.appendChild(createEl('circle', {
      cx: x2, cy: y2, r: 4, fill: '#444'
    }));

    // Label on the wire (positioned at midpoint, slightly above the curve)
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;

    // Background for label readability
    const labelW = groupLabel.length * 7 + 12;
    svg.appendChild(createEl('rect', {
      x: midX - labelW/2, y: midY - 10,
      width: labelW, height: 18,
      fill: '#fff', stroke: '#444',
      'stroke-width': 1, rx: 9, opacity: 1
    }));

    const lbl = createEl('text', {
      x: midX, y: midY + 3,
      'text-anchor': 'middle',
      'font-size': 11, 'font-weight': 'bold', fill: '#222'
    });
    lbl.textContent = groupLabel;
    svg.appendChild(lbl);
  }

  if (transitInfo) {
    const midX = (from.x + from.width + to.x) / 2;
    const hasLegs = transitInfo.legs && transitInfo.legs.length > 0;
    const boxW = hasLegs ? 230 : 130;
    const boxH = hasLegs ? 32 + transitInfo.legs.length * 11 + 6 : 32;
    const midY = (outY + inY) / 2 - boxH/2;

    svg.appendChild(createEl('rect', {
      x: midX - boxW/2, y: midY,
      width: boxW, height: boxH,
      fill: '#fff', stroke: '#3498db',
      'stroke-width': 1, rx: 4, opacity: 0.97
    }));
    const t1 = createEl('text', {
      x: midX, y: midY + 14,
      'text-anchor': 'middle',
      'font-size': 10, 'font-weight': 'bold', fill: '#2980b9'
    });
    t1.textContent = transitInfo.label;
    svg.appendChild(t1);
    const t2 = createEl('text', {
      x: midX, y: midY + 27,
      'text-anchor': 'middle',
      'font-size': 9, fill: '#555'
    });
    t2.textContent = transitInfo.sub;
    svg.appendChild(t2);

    if (hasLegs) {
      transitInfo.legs.forEach((leg, i) => {
        const legText = createEl('text', {
          x: midX - boxW/2 + 6, y: midY + 42 + i * 11,
          'font-size': 8, fill: '#666'
        });
        legText.textContent = `• ${leg}`;
        svg.appendChild(legText);
      });
    }
  }

  // Helper to build group label
  function buildGroupLabel2(people) {
    const nums = people.map(p => parseInt(p.replace('P',''))).sort((a,b)=>a-b);
    let contiguous = true;
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] !== nums[i-1] + 1) { contiguous = false; break; }
    }
    if (contiguous && nums.length > 1) return `P${nums[0]}-${nums[nums.length-1]}`;
    if (nums.length === 1) return `P${nums[0]}`;
    return nums.map(n => `P${n}`).join(',');
  }

  // Leaving group - single dashed curve with combined label
  if (leavingPeople.length > 0) {
    const x1 = from.x + from.width;
    const y1 = from.y + from.height - 35;
    const x2 = x1 + 60;
    const y2 = y1 + 45;

    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1+25} ${y1}, ${x2} ${y2-20}, ${x2} ${y2}`,
      stroke: '#888',
      'stroke-width': 2, fill: 'none',
      opacity: 0.7, 'stroke-dasharray': '4,3'
    }));

    const exitLabel = createEl('text', {
      x: x2 + 4, y: y2 + 4,
      'font-size': 11, 'font-weight': 'bold', fill: '#e67e22'
    });
    exitLabel.textContent = T().flyHomeBubble(buildGroupLabel2(leavingPeople));
    svg.appendChild(exitLabel);
  }

  // Entering group - single dashed curve with combined label
  if (enteringPeople.length > 0) {
    const x2 = to.x;
    const y2 = to.y + 35;
    const x1 = x2 - 60;
    const y1 = y2 - 45;

    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1} ${y1+20}, ${x2-25} ${y2}, ${x2} ${y2}`,
      stroke: '#888',
      'stroke-width': 2, fill: 'none',
      opacity: 0.7, 'stroke-dasharray': '4,3'
    }));

    const enterLabel = createEl('text', {
      x: x1 - 4, y: y1 - 2,
      'font-size': 11, 'font-weight': 'bold',
      fill: '#666', 'text-anchor': 'end'
    });
    enterLabel.textContent = T().joins(buildGroupLabel2(enteringPeople));
    svg.appendChild(enterLabel);
  }
}

    'stroke-width': 1, rx: 8
  }));
  const lblTxt = createEl('text', {
    x: plx + 20, y: legendY1 + 4,
    'text-anchor': 'middle',
    'font-size': 10, 'font-weight': 'bold', fill: '#222'
  });
  lblTxt.textContent = item.label;
  svg.appendChild(lblTxt);

  const desc = createEl('text', {
    x: plx + 42, y: legendY1 + 4,
    'font-size': 11, fill: '#555'
  });
  desc.textContent = item.desc;
  svg.appendChild(desc);

  plx += 200;
});

const legendItems = [
  { color: '#27ae60', label: T().legend.checkin },
  { color: '#c0392b', label: T().legend.checkout },
  { color: '#8e44ad', label: T().legend.excursion },
  { color: '#e67e22', label: T().legend.flight },
  { color: '#2980b9', label: T().legend.other }
];
let lx = BLOCK_X_START;
legendItems.forEach(item => {
  svg.appendChild(createEl('circle', {
    cx: lx, cy: legendY2, r: 4, fill: item.color
  }));
  const txt = createEl('text', {
    x: lx + 10, y: legendY2 + 4,
    'font-size': 11, fill: '#444'
  });
  txt.textContent = item.label;
  svg.appendChild(txt);
  lx += 160;
});

// ===== Tab interactivity =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const blockIdx = btn.getAttribute('data-block');
    const tabId = btn.getAttribute('data-tab');

    // Hide all view groups for this block
    ['schedule','restaurants','shopping'].forEach(v => {
      const g = document.getElementById(`${v}-${blockIdx}`);
      if (g) g.style.display = (v === tabId) ? '' : 'none';
    });

    // Toggle the HTML gallery for this block (only shows on Restaurants tab)
    const gallery = document.getElementById(`gallery-${blockIdx}`);
    if (gallery) {
      if (tabId === 'restaurants') gallery.classList.add('active');
      else gallery.classList.remove('active');
    }

    // Update tab visuals: find all tab buttons for this block
    document.querySelectorAll(`.tab-btn[data-block="${blockIdx}"]`).forEach(t => {
      const isActive = t.getAttribute('data-tab') === tabId;
      t.setAttribute('fill', isActive ? '#222' : '#fff');
    });
    // Update tab text labels
    document.querySelectorAll(`text.tab-text[data-block="${blockIdx}"]`).forEach(t => {
      const isActive = t.getAttribute('data-tab') === tabId;
      t.setAttribute('fill', isActive ? '#fff' : '#444');
      t.setAttribute('font-weight', isActive ? 'bold' : 'normal');
    });
  });
});

// ===== Detail badge click handlers =====
document.querySelectorAll('.detail-badge').forEach(badge => {
  badge.addEventListener('click', e => {
    const idx = parseInt(badge.getAttribute('data-detail-block'), 10);
    openDetail(idx);
  });
});

// Update modal close button text
const closeBtn = document.getElementById('detail-modal-close-btn');
if (closeBtn) closeBtn.textContent = '✕ ' + T().closeBtn;

} // end of buildDiagram()

// ========== Language toggle ==========
function setLang(lang) {
  currentLang = lang;
  // Update page title and subtitle
  const titleEl = document.getElementById('page-title');
  const subEl = document.getElementById('page-subtitle');
  if (titleEl) titleEl.textContent = T().title;
  if (subEl) subEl.innerHTML = T().subtitle;
  document.title = T().title;
  // Update toggle button states
  const btnKo = document.getElementById('btn-ko');
  const btnEn = document.getElementById('btn-en');
  if (btnKo && btnEn) {
    btnKo.classList.toggle('active', lang === 'ko');
    btnEn.classList.toggle('active', lang === 'en');
  }
  // Re-render the SVG diagram with the new language
  buildDiagram();
  // If modal is open, refresh its content too
  const modal = document.getElementById('detail-modal-overlay');
  if (modal && modal.classList.contains('active')) {
    const idx = parseInt(modal.getAttribute('data-current-block') || '-1', 10);
    if (idx >= 0) renderDetailModal(idx);
  }
}

// ========== Detail modal ==========
function getTransitInfo(fromIdx, toIdx) {
  // Returns transit info between two blocks (by index in schedule), or null
  const from = schedule[fromIdx];
  const to = schedule[toIdx];
  if (!from || !to) return null;
  const trainLabel = currentLang === 'ko' ? '기차' : 'Train';
  const route = `${from.location}→${to.location}`;
  if (route === 'Zurich→Interlaken') return { label: trainLabel, sub: '4:41 PM → 6:59 PM', legs: [] };
  if (route === 'Interlaken→Grindelwald') return { label: trainLabel, sub: '10:00 AM → 11:00 AM', legs: [] };
  if (route === 'Grindelwald→Milano') return {
    label: trainLabel, sub: '1:17 PM → 5:50 PM',
    legs: currentLang === 'ko' ? [
      '그린델발트 13:17 → 인터라켄 오스트 13:54',
      '인터라켄 오스트 13:59 → 슈피츠 14:23',
      '슈피츠 14:38 → 브리크 15:13',
      '브리크 15:41 → 밀라노 중앙역 17:50'
    ] : [
      'Grindelwald 13:17 → Interlaken Ost 13:54',
      'Interlaken Ost 13:59 → Spiez 14:23',
      'Spiez 14:38 → Brig 15:13',
      'Brig 15:41 → Milano Centrale 17:50'
    ]
  };
  if (route === 'Milano→Firenze') return {
    label: trainLabel,
    sub: currentLang === 'ko' ? '1:10 PM → 3:04 PM (1시간 54분)' : '1:10 PM → 3:04 PM (1h 54m)',
    legs: []
  };
  if (route === 'Firenze→Rome') return { label: trainLabel, sub: '7:33 PM → 8:59 PM', legs: [] };
  return null;
}

function eventTypeIcon(type) {
  if (type === 'checkin')   return '✓';
  if (type === 'checkout')  return '✗';
  if (type === 'excursion') return '★';
  if (type === 'flight')    return '✈';
  return '●';
}

function openDetail(blockIdx) {
  const modal = document.getElementById('detail-modal-overlay');
  modal.setAttribute('data-current-block', String(blockIdx));
  renderDetailModal(blockIdx);
  modal.classList.add('active');
  document.body.style.overflow = 'hidden'; // prevent background scroll
}

function closeDetail() {
  const modal = document.getElementById('detail-modal-overlay');
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

function closeDetailIfBackdrop(event) {
  // Close only when clicking the dark backdrop, not the modal content
  if (event.target.id === 'detail-modal-overlay') closeDetail();
}

function renderDetailModal(blockIdx) {
  const item = schedule[blockIdx];
  if (!item) return;
  const body = document.getElementById('detail-modal-body');
  const closeBtn = document.getElementById('detail-modal-close-btn');
  if (closeBtn) closeBtn.textContent = '✕ ' + T().closeBtn;

  const datesArr = L(item, 'dates') || item.dates;
  const locName = L(item, 'location');
  const hotelName = L(item, 'hotel');

  // Build header
  let html = `
    <div class="detail-modal-header">
      <h2 class="detail-modal-title">${locName}</h2>
      <div class="detail-modal-meta">
        <span style="font-style: italic;">${hotelName}</span>
        &nbsp;·&nbsp; ${datesArr.join(' &nbsp; ')}
        &nbsp;·&nbsp; ${item.people.join(', ')}
      </div>
    </div>
  `;

  // Inbound transit (if any)
  const inbound = blockIdx > 0 ? getTransitInfo(blockIdx - 1, blockIdx) : null;
  if (inbound) {
    const fromLoc = L(schedule[blockIdx - 1], 'location');
    html += `
      <div class="detail-transit">
        <div class="transit-label">${T().arriveLabel}: ${fromLoc} → ${locName} (${inbound.label}, ${inbound.sub})</div>
        ${inbound.legs.map(leg => `<div class="transit-leg">• ${leg}</div>`).join('')}
      </div>
    `;
  }

  // Group notes by day
  const notesByDay = {};
  item.notes.forEach(n => {
    if (!notesByDay[n.day]) notesByDay[n.day] = [];
    notesByDay[n.day].push(n);
  });

  // Sort each day chronologically
  Object.keys(notesByDay).forEach(d => {
    notesByDay[d].sort((a, b) => timeToY(a.time, 0) - timeToY(b.time, 0));
  });

  // Render each day
  for (let d = 0; d < item.days; d++) {
    const dayNotes = notesByDay[d] || [];
    const dateStr = datesArr[d] || '';
    html += `<div class="detail-day">`;
    html += `<div class="detail-day-header">${dateStr}</div>`;
    if (dayNotes.length === 0) {
      html += `<div style="color: #999; padding: 8px 12px; font-size: 13px;">—</div>`;
    } else {
      dayNotes.forEach(n => {
        const type = n.type || 'other';
        const icon = eventTypeIcon(n.type);
        const labelText = L(n, 'label');
        html += `
          <div class="detail-event ${type}">
            <div class="detail-event-time">${n.time}</div>
            <div class="detail-event-icon">${icon}</div>
            <div class="detail-event-label">${labelText}</div>
          </div>
        `;
      });
    }
    html += `</div>`;
  }

  // Outbound transit (if any)
  const outbound = blockIdx < schedule.length - 1 ? getTransitInfo(blockIdx, blockIdx + 1) : null;
  if (outbound) {
    const toLoc = L(schedule[blockIdx + 1], 'location');
    html += `
      <div class="detail-transit">
        <div class="transit-label">${T().departLabel}: ${locName} → ${toLoc} (${outbound.label}, ${outbound.sub})</div>
        ${outbound.legs.map(leg => `<div class="transit-leg">• ${leg}</div>`).join('')}
      </div>
    `;
  }

  body.innerHTML = html;
}

// Allow ESC key to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('detail-modal-overlay');
    if (modal && modal.classList.contains('active')) closeDetail();
  }
});

// Initial render (Korean is the default)
buildDiagram();

</script>
