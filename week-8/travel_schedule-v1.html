<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Schedule — Switzerland & Italy 2026</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #ffffff;
    color: #222;
    margin: 0;
    padding: 30px;
  }
  h1 {
    text-align: center;
    color: #333;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 25px;
    font-size: 14px;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .legend-color {
    width: 28px;
    height: 4px;
    border-radius: 2px;
  }
  .diagram-container {
    position: relative;
    overflow-x: auto;
    background: #fafafa;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 20px;
  }
  svg {
    display: block;
  }
</style>
</head>
<body>

<h1>Travel Schedule — Switzerland & Italy</h1>
<p class="subtitle">May 23 – June 6, 2026 &nbsp;|&nbsp; Zurich → Interlaken → Grindelwald → Milano → Firenze → Rome</p>

<div class="diagram-container">
<svg id="diagram" width="2000" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
</div>

<script>
const personColors = {
  P1: '#e74c3c',
  P2: '#3498db',
  P3: '#2ecc71',
  P4: '#f39c12',
  P5: '#9b59b6'
};

const schedule = [
  {
    location: 'Zurich',
    hotel: '(Day visit only)',
    people: ['P1','P2','P3','P4','P5'],
    dates: ['5/23 Sat'],
    days: 1,
    notes: [
      { day: 0, time: '7:34 AM',  label: 'P3 arrives ZRH', type: 'flight' },
      { day: 0, time: '11:30 AM', label: 'P1,2,4,5 arrive ZRH', type: 'flight' },
      { day: 0, time: '12:30 PM', label: 'Airport → Zurich HB' },
      { day: 0, time: '1:00 PM',  label: 'Lunch & city tour' },
      { day: 0, time: '4:41 PM',  label: 'Train → Interlaken' }
    ]
  },
  {
    location: 'Interlaken',
    hotel: 'Heart of Interlaken',
    people: ['P1','P2','P3','P4','P5'],
    dates: ['5/23 Sat','5/24 Sun','5/25 Mon'],
    days: 3,
    notes: [
      { day: 0, time: '6:59 PM', label: 'Arrive Interlaken Ost' },
      { day: 0, time: '4:00 PM', label: 'Check-in Hotel', type: 'checkin' },
      { day: 2, time: '1:00 PM', label: 'Paragliding start', type: 'excursion' },
      { day: 2, time: '3:00 PM', label: 'Paragliding end', type: 'excursion' },
      { day: 2, time: '10:00 AM', label: 'Checkout (Tue 5/26)', type: 'checkout' }
    ]
  },
  {
    location: 'Grindelwald',
    hotel: 'Chalet Carve',
    people: ['P1','P2','P3','P4','P5'],
    dates: ['5/26 Tue','5/27 Wed','5/28 Thu'],
    days: 3,
    notes: [
      { day: 0, time: '4:00 PM',  label: 'Check-in Chalet Carve', type: 'checkin' },
      { day: 0, time: '1:44 PM',  label: 'Train → Eigergletscher', type: 'excursion' },
      { day: 0, time: '2:13 PM',  label: '→ Jungfraujoch', type: 'excursion' },
      { day: 0, time: '4:45 PM',  label: 'Jungfraujoch → Eigergl.', type: 'excursion' },
      { day: 0, time: '5:18 PM',  label: 'Arrive Grindelwald', type: 'excursion' },
      { day: 1, time: '8:00 AM',  label: 'Lauterbrunnen tour start', type: 'excursion' },
      { day: 1, time: '6:00 PM',  label: 'Lauterbrunnen tour end', type: 'excursion' },
      { day: 2, time: '8:00 AM',  label: 'Checkout (Fri 5/29)', type: 'checkout' }
    ]
  },
  {
    location: 'Milano',
    hotel: 'Hotel The Square',
    people: ['P1','P2','P3','P4','P5'],
    dates: ['5/29 Fri','5/30 Sat'],
    days: 2,
    notes: [
      { day: 0, time: '6:00 PM',  label: 'Check-in Hotel', type: 'checkin' },
      { day: 1, time: '12:00 PM', label: 'Checkout (Sun 5/31)', type: 'checkout' },
      { day: 1, time: '2:55 PM',  label: 'P4-5 fly MIL → home (Sun 5/31)', type: 'flight' }
    ]
  },
  {
    location: 'Firenze',
    hotel: 'FH55',
    people: ['P1','P2','P3'],
    dates: ['5/31 Sun','6/1 Mon','6/2 Tue'],
    days: 3,
    notes: [
      { day: 0, time: '3:30 PM',  label: 'Check-in FH55', type: 'checkin' },
      { day: 2, time: '9:00 AM',  label: 'Uffizi Gallery start', type: 'excursion' },
      { day: 2, time: '6:00 PM',  label: 'Uffizi Gallery end', type: 'excursion' },
      { day: 2, time: '11:00 AM', label: 'Checkout (Wed 6/3)', type: 'checkout' }
    ]
  },
  {
    location: 'Rome',
    hotel: 'Eitch Borromini',
    people: ['P1','P2','P3'],
    dates: ['6/3 Wed','6/4 Thu','6/5 Fri','6/6 Sat'],
    days: 4,
    notes: [
      { day: 0, time: '9:00 PM',  label: 'Arrive Rome / Check-in', type: 'checkin' },
      { day: 2, time: '9:30 AM',  label: 'Vatican start', type: 'excursion' },
      { day: 2, time: '2:40 PM',  label: 'Vatican end', type: 'excursion' },
      { day: 3, time: '11:00 AM', label: 'Checkout', type: 'checkout' },
      { day: 3, time: '1:35 PM',  label: 'P1-3 fly home', type: 'flight' }
    ]
  }
];

const COL_WIDTH = 115;
const BLOCK_GAP = 95;
const BLOCK_X_START = 70;
const BLOCK_Y = 170;
const HOUR_TOP = 6;
const HOUR_BOTTOM = 22;
const HOUR_HEIGHT = 30;
const BLOCK_HEIGHT = (HOUR_BOTTOM - HOUR_TOP) * HOUR_HEIGHT;

const svg = document.getElementById('diagram');
const SVG_NS = 'http://www.w3.org/2000/svg';

const blocks = [];
let currentX = BLOCK_X_START;

schedule.forEach((item, idx) => {
  const width = COL_WIDTH * item.days;
  blocks.push({
    ...item, idx,
    x: currentX, y: BLOCK_Y,
    width: width, height: BLOCK_HEIGHT
  });
  currentX += width + BLOCK_GAP;
});

svg.setAttribute('width', currentX + 180);
svg.setAttribute('height', BLOCK_Y + BLOCK_HEIGHT + 130);

function createEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function timeToY(timeStr, blockY) {
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return blockY;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const totalHours = h + min/60;
  return blockY + (totalHours - HOUR_TOP) * HOUR_HEIGHT;
}

// Time axis
const axisX = 50;
for (let h = HOUR_TOP; h <= HOUR_BOTTOM; h += 2) {
  const y = BLOCK_Y + (h - HOUR_TOP) * HOUR_HEIGHT;
  const label = createEl('text', {
    x: axisX, y: y + 4,
    'text-anchor': 'end',
    'font-size': 10, fill: '#888'
  });
  const hr12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  const ampm = h >= 12 ? 'PM' : 'AM';
  label.textContent = `${hr12}${ampm}`;
  svg.appendChild(label);
}

// Note color/style by type
function noteStyle(type) {
  if (type === 'checkin')   return { color: '#27ae60', label: '✓ IN' };
  if (type === 'checkout')  return { color: '#c0392b', label: '✗ OUT' };
  if (type === 'excursion') return { color: '#8e44ad', label: '★' };
  if (type === 'flight')    return { color: '#e67e22', label: '✈' };
  return { color: '#2980b9', label: '' };
}

// Draw blocks
blocks.forEach((b) => {
  for (let d = 0; d < b.days; d++) {
    const dateLabel = createEl('text', {
      x: b.x + d * COL_WIDTH + COL_WIDTH/2,
      y: b.y - 30,
      'text-anchor': 'middle',
      'font-size': 11, fill: '#666',
      'font-weight': 'bold'
    });
    dateLabel.textContent = b.dates[d] || '';
    svg.appendChild(dateLabel);
  }

  const locLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 90,
    'text-anchor': 'middle',
    'font-size': 17, 'font-weight': 'bold', fill: '#222'
  });
  locLabel.textContent = b.location;
  svg.appendChild(locLabel);

  const hotelLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 72,
    'text-anchor': 'middle',
    'font-size': 11, 'font-style': 'italic', fill: '#777'
  });
  hotelLabel.textContent = b.hotel;
  svg.appendChild(hotelLabel);

  const peopleLabel = createEl('text', {
    x: b.x + b.width/2, y: b.y - 54,
    'text-anchor': 'middle',
    'font-size': 10, fill: '#999'
  });
  peopleLabel.textContent = b.people.join(', ');
  svg.appendChild(peopleLabel);

  const rect = createEl('rect', {
    x: b.x, y: b.y,
    width: b.width, height: b.height,
    fill: '#ffffff', stroke: '#444',
    'stroke-width': 1.5, rx: 6,
    filter: 'url(#shadow)'
  });
  svg.appendChild(rect);

  for (let d = 1; d < b.days; d++) {
    const sepX = b.x + d * COL_WIDTH;
    svg.appendChild(createEl('line', {
      x1: sepX, y1: b.y, x2: sepX, y2: b.y + b.height,
      stroke: '#ddd', 'stroke-width': 1,
      'stroke-dasharray': '3,3'
    }));
  }

  for (let h = HOUR_TOP + 2; h < HOUR_BOTTOM; h += 2) {
    const gy = b.y + (h - HOUR_TOP) * HOUR_HEIGHT;
    svg.appendChild(createEl('line', {
      x1: b.x, y1: gy, x2: b.x + b.width, y2: gy,
      stroke: '#f3f3f3', 'stroke-width': 1
    }));
  }

  const startLbl = createEl('text', {
    x: b.x + 6, y: b.y + 12,
    'font-size': 9, fill: '#bbb'
  });
  startLbl.textContent = '6 AM';
  svg.appendChild(startLbl);

  const endLbl = createEl('text', {
    x: b.x + b.width - 6, y: b.y + b.height - 6,
    'font-size': 9, fill: '#bbb', 'text-anchor': 'end'
  });
  endLbl.textContent = '10 PM';
  svg.appendChild(endLbl);

  // Event notes - draw with type-based styling
  b.notes.forEach(n => {
    const ny = timeToY(n.time, b.y);
    const colX = b.x + n.day * COL_WIDTH;
    const style = noteStyle(n.type);

    // tick line
    svg.appendChild(createEl('line', {
      x1: colX, y1: ny,
      x2: colX + COL_WIDTH, y2: ny,
      stroke: style.color, 'stroke-width': 1, opacity: 0.5
    }));

    // dot at start of tick
    svg.appendChild(createEl('circle', {
      cx: colX + 3, cy: ny, r: 2.5, fill: style.color
    }));

    const noteTime = createEl('text', {
      x: colX + 8, y: ny - 2,
      'font-size': 9, 'font-weight': 'bold', fill: style.color
    });
    noteTime.textContent = n.time;
    svg.appendChild(noteTime);

    const noteText = createEl('text', {
      x: colX + 8, y: ny + 10,
      'font-size': 8.5, fill: '#444'
    });
    noteText.textContent = n.label;
    svg.appendChild(noteText);
  });
});

// Bezier connections
for (let i = 0; i < blocks.length - 1; i++) {
  const from = blocks[i];
  const to = blocks[i+1];

  const sharedPeople = from.people.filter(p => to.people.includes(p));
  const leavingPeople = from.people.filter(p => !to.people.includes(p));
  const enteringPeople = to.people.filter(p => !from.people.includes(p));

  // Determine output and input Y based on actual departure / arrival times
  let outY, inY, transitInfo = null;

  if (from.location === 'Zurich' && to.location === 'Interlaken') {
    outY = timeToY('4:41 PM', from.y);
    inY  = timeToY('6:59 PM', to.y);
    transitInfo = { label: 'Train', sub: '4:41 PM → 6:59 PM' };
  } else if (from.location === 'Interlaken' && to.location === 'Grindelwald') {
    outY = timeToY('10:00 AM', from.y);
    inY  = timeToY('11:00 AM', to.y);
    transitInfo = { label: 'Train', sub: '10:00 AM → 11:00 AM' };
  } else if (from.location === 'Grindelwald' && to.location === 'Milano') {
    outY = timeToY('1:17 PM', from.y);
    inY  = timeToY('5:50 PM', to.y);
    transitInfo = {
      label: 'Train',
      sub: '1:17 PM → 5:50 PM',
      legs: [
        'Grindelwald 13:17 → Interlaken Ost 13:54',
        'Interlaken Ost 13:59 → Spiez 14:23',
        'Spiez 14:38 → Brig 15:13',
        'Brig 15:41 → Milano Centrale 17:50'
      ]
    };
  } else if (from.location === 'Milano' && to.location === 'Firenze') {
    outY = timeToY('1:10 PM', from.y);
    inY  = timeToY('3:04 PM', to.y);
    transitInfo = {
      label: 'Train',
      sub: '1:10 PM → 3:04 PM (1h 54m)'
    };
  } else if (from.location === 'Firenze' && to.location === 'Rome') {
    outY = timeToY('7:33 PM', from.y);
    inY  = timeToY('8:59 PM', to.y);
    transitInfo = { label: 'Train', sub: '7:33 PM → 8:59 PM' };
  } else {
    outY = from.y + from.height/2;
    inY  = to.y + to.height/2;
  }

  // Single connection wire with group label (P1-5 / P1-3 / etc.)
  if (sharedPeople.length > 0) {
    const x1 = from.x + from.width;
    const y1 = outY;
    const x2 = to.x;
    const y2 = inY;
    const dx = (x2 - x1) * 0.5;

    // Build label - if contiguous numbered run like P1,P2,P3 -> "P1-3"
    function buildGroupLabel(people) {
      const nums = people.map(p => parseInt(p.replace('P',''))).sort((a,b)=>a-b);
      // check contiguous
      let contiguous = true;
      for (let i = 1; i < nums.length; i++) {
        if (nums[i] !== nums[i-1] + 1) { contiguous = false; break; }
      }
      if (contiguous && nums.length > 1) {
        return `P${nums[0]}-${nums[nums.length-1]}`;
      }
      if (nums.length === 1) return `P${nums[0]}`;
      return nums.map(n => `P${n}`).join(',');
    }

    const groupLabel = buildGroupLabel(sharedPeople);

    // Single bezier path - dark gray, thicker
    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`,
      stroke: '#444',
      'stroke-width': 2.5, fill: 'none', opacity: 0.9
    }));

    // Endpoint dots
    svg.appendChild(createEl('circle', {
      cx: x1, cy: y1, r: 4, fill: '#444'
    }));
    svg.appendChild(createEl('circle', {
      cx: x2, cy: y2, r: 4, fill: '#444'
    }));

    // Label on the wire (positioned at midpoint, slightly above the curve)
    const midX = (x1 + x2) / 2;
    const midY = (y1 + y2) / 2;

    // Background for label readability
    const labelW = groupLabel.length * 7 + 12;
    svg.appendChild(createEl('rect', {
      x: midX - labelW/2, y: midY - 10,
      width: labelW, height: 18,
      fill: '#fff', stroke: '#444',
      'stroke-width': 1, rx: 9, opacity: 1
    }));

    const lbl = createEl('text', {
      x: midX, y: midY + 3,
      'text-anchor': 'middle',
      'font-size': 11, 'font-weight': 'bold', fill: '#222'
    });
    lbl.textContent = groupLabel;
    svg.appendChild(lbl);
  }

  if (transitInfo) {
    const midX = (from.x + from.width + to.x) / 2;
    const hasLegs = transitInfo.legs && transitInfo.legs.length > 0;
    const boxW = hasLegs ? 230 : 130;
    const boxH = hasLegs ? 32 + transitInfo.legs.length * 11 + 6 : 32;
    const midY = (outY + inY) / 2 - boxH/2;

    svg.appendChild(createEl('rect', {
      x: midX - boxW/2, y: midY,
      width: boxW, height: boxH,
      fill: '#fff', stroke: '#3498db',
      'stroke-width': 1, rx: 4, opacity: 0.97
    }));
    const t1 = createEl('text', {
      x: midX, y: midY + 14,
      'text-anchor': 'middle',
      'font-size': 10, 'font-weight': 'bold', fill: '#2980b9'
    });
    t1.textContent = transitInfo.label;
    svg.appendChild(t1);
    const t2 = createEl('text', {
      x: midX, y: midY + 27,
      'text-anchor': 'middle',
      'font-size': 9, fill: '#555'
    });
    t2.textContent = transitInfo.sub;
    svg.appendChild(t2);

    if (hasLegs) {
      transitInfo.legs.forEach((leg, i) => {
        const legText = createEl('text', {
          x: midX - boxW/2 + 6, y: midY + 42 + i * 11,
          'font-size': 8, fill: '#666'
        });
        legText.textContent = `• ${leg}`;
        svg.appendChild(legText);
      });
    }
  }

  // Helper to build group label
  function buildGroupLabel2(people) {
    const nums = people.map(p => parseInt(p.replace('P',''))).sort((a,b)=>a-b);
    let contiguous = true;
    for (let i = 1; i < nums.length; i++) {
      if (nums[i] !== nums[i-1] + 1) { contiguous = false; break; }
    }
    if (contiguous && nums.length > 1) return `P${nums[0]}-${nums[nums.length-1]}`;
    if (nums.length === 1) return `P${nums[0]}`;
    return nums.map(n => `P${n}`).join(',');
  }

  // Leaving group - single dashed curve with combined label
  if (leavingPeople.length > 0) {
    const x1 = from.x + from.width;
    const y1 = from.y + from.height - 35;
    const x2 = x1 + 60;
    const y2 = y1 + 45;

    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1+25} ${y1}, ${x2} ${y2-20}, ${x2} ${y2}`,
      stroke: '#888',
      'stroke-width': 2, fill: 'none',
      opacity: 0.7, 'stroke-dasharray': '4,3'
    }));

    const exitLabel = createEl('text', {
      x: x2 + 4, y: y2 + 4,
      'font-size': 11, 'font-weight': 'bold', fill: '#e67e22'
    });
    exitLabel.textContent = `${buildGroupLabel2(leavingPeople)} fly home ✈`;
    svg.appendChild(exitLabel);
  }

  // Entering group - single dashed curve with combined label
  if (enteringPeople.length > 0) {
    const x2 = to.x;
    const y2 = to.y + 35;
    const x1 = x2 - 60;
    const y1 = y2 - 45;

    svg.appendChild(createEl('path', {
      d: `M ${x1} ${y1} C ${x1} ${y1+20}, ${x2-25} ${y2}, ${x2} ${y2}`,
      stroke: '#888',
      'stroke-width': 2, fill: 'none',
      opacity: 0.7, 'stroke-dasharray': '4,3'
    }));

    const enterLabel = createEl('text', {
      x: x1 - 4, y: y1 - 2,
      'font-size': 11, 'font-weight': 'bold',
      fill: '#666', 'text-anchor': 'end'
    });
    enterLabel.textContent = `${buildGroupLabel2(enteringPeople)} joins`;
    svg.appendChild(enterLabel);
  }
}

// Final fly-home exit from the last block (Rome)
const lastBlock = blocks[blocks.length - 1];
{
  // Anchor at flight time on the last column
  const flightY = timeToY('1:35 PM', lastBlock.y);
  const x1 = lastBlock.x + lastBlock.width;
  const y1 = flightY;
  const x2 = x1 + 90;
  const y2 = y1;

  // Bezier curve out to the right
  svg.appendChild(createEl('path', {
    d: `M ${x1} ${y1} C ${x1+30} ${y1}, ${x2-30} ${y2}, ${x2} ${y2}`,
    stroke: '#e67e22',
    'stroke-width': 2.5, fill: 'none', opacity: 0.85
  }));

  // Endpoint dot
  svg.appendChild(createEl('circle', {
    cx: x1, cy: y1, r: 4, fill: '#e67e22'
  }));

  // Arrow at end
  svg.appendChild(createEl('polygon', {
    points: `${x2},${y2} ${x2-8},${y2-5} ${x2-8},${y2+5}`,
    fill: '#e67e22'
  }));

  // Label bubble
  svg.appendChild(createEl('rect', {
    x: x1 + 18, y: y1 - 22,
    width: 70, height: 18,
    fill: '#fff', stroke: '#e67e22',
    'stroke-width': 1, rx: 9
  }));
  const flbl = createEl('text', {
    x: x1 + 53, y: y1 - 9,
    'text-anchor': 'middle',
    'font-size': 10, 'font-weight': 'bold', fill: '#d35400'
  });
  flbl.textContent = 'P1-3 ✈ home';
  svg.appendChild(flbl);
}

// Legend - two rows at bottom
// Row 1: P1-P5 person colors (line samples)
// Row 2: Note type symbols
const legendY1 = BLOCK_Y + BLOCK_HEIGHT + 40;
const legendY2 = BLOCK_Y + BLOCK_HEIGHT + 70;

// Row 1: Wire / connection legend (single line with group label)
const wireLegend = [
  { type: 'solid',  label: 'P1-5', desc: 'all 5 travelers' },
  { type: 'solid',  label: 'P1-3', desc: 'travelers continuing' },
  { type: 'dashed', label: 'P4-5', desc: 'departs / joins' }
];

let plx = BLOCK_X_START;
wireLegend.forEach(item => {
  const lineAttrs = {
    x1: plx - 4, y1: legendY1,
    x2: plx + 28, y2: legendY1,
    stroke: item.type === 'dashed' ? '#888' : '#444',
    'stroke-width': item.type === 'dashed' ? 2 : 2.5
  };
  if (item.type === 'dashed') lineAttrs['stroke-dasharray'] = '4,3';
  svg.appendChild(createEl('line', lineAttrs));

  // small bubble label on the line
  svg.appendChild(createEl('rect', {
    x: plx + 4, y: legendY1 - 8,
    width: 32, height: 16,
    fill: '#fff', stroke: '#444',
    'stroke-width': 1, rx: 8
  }));
  const lblTxt = createEl('text', {
    x: plx + 20, y: legendY1 + 4,
    'text-anchor': 'middle',
    'font-size': 10, 'font-weight': 'bold', fill: '#222'
  });
  lblTxt.textContent = item.label;
  svg.appendChild(lblTxt);

  const desc = createEl('text', {
    x: plx + 42, y: legendY1 + 4,
    'font-size': 11, fill: '#555'
  });
  desc.textContent = item.desc;
  svg.appendChild(desc);

  plx += 200;
});

const legendItems = [
  { color: '#27ae60', label: '✓ Check-in' },
  { color: '#c0392b', label: '✗ Checkout' },
  { color: '#8e44ad', label: '★ Excursion / Transit' },
  { color: '#e67e22', label: '✈ Flight' },
  { color: '#2980b9', label: '● Other event' }
];
let lx = BLOCK_X_START;
legendItems.forEach(item => {
  svg.appendChild(createEl('circle', {
    cx: lx, cy: legendY2, r: 4, fill: item.color
  }));
  const txt = createEl('text', {
    x: lx + 10, y: legendY2 + 4,
    'font-size': 11, fill: '#444'
  });
  txt.textContent = item.label;
  svg.appendChild(txt);
  lx += 160;
});

</script>
