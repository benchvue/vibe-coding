<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 1 – Vibe Coding Tools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #111;
  }
  h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #999; margin-bottom: 8px; }
  h2 { font-size: 28px; font-weight: 600; color: #111; margin-bottom: 60px; letter-spacing: -0.02em; }
  .icon-circle { fill: #fff; stroke: #ddd; stroke-width: 1.5; }
  .branch-circle { fill: #fff; stroke: #ddd; stroke-width: 1.5; }
  .footer { margin-top: 60px; font-size: 12px; color: #ccc; letter-spacing: 0.05em; }
</style>
</head>
<body>

<h1>Week 1</h1>
<h2>Vibe Coding Tools</h2>

<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block;">
  <defs>
    <clipPath id="clip-vscode"><circle cx="0" cy="0" r="30"/></clipPath>
    <clipPath id="clip-gmail"><circle cx="0" cy="0" r="30"/></clipPath>
    <clipPath id="clip-git"><circle cx="0" cy="0" r="30"/></clipPath>
    <clipPath id="clip-github"><circle cx="0" cy="0" r="30"/></clipPath>
    <clipPath id="clip-combo"><circle cx="0" cy="0" r="30"/></clipPath>
    <clipPath id="clip-combo-child"><circle cx="0" cy="0" r="16"/></clipPath>
  </defs>

  <!-- Orbit ring -->
  <circle cx="320" cy="320" r="180" fill="none" stroke="#bbb" stroke-width="3"/>
  <circle cx="320" cy="320" r="6" fill="#ccc"/>

  <!-- ===== VS CODE (badge 1) ===== -->
  <line id="line-vscode" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <a href="https://code.visualstudio.com/download" target="_blank" id="node-vscode">
    <circle class="icon-circle" r="36" id="bg-vscode"/>
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Visual_Studio_Code_1.35_icon.svg/250px-Visual_Studio_Code_1.35_icon.svg.png"
           x="-30" y="-30" width="60" height="60" clip-path="url(#clip-vscode)" style="pointer-events:none;"/>
    <text y="50" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI,sans-serif" font-weight="500">VS Code</text>
    <!-- Badge -->
    <circle cx="-26" cy="-26" r="11" fill="#007ACC" stroke="#fff" stroke-width="2"/>
    <text x="-26" y="-22" text-anchor="middle" font-size="12" fill="#fff" font-family="Segoe UI,sans-serif" font-weight="700">1</text>
  </a>
  <a href="https://marketplace.visualstudio.com/items?itemName=ritwickdey.LiveServer" target="_blank" id="branch-vscode">
    <circle class="branch-circle" r="22" id="bbg-vscode"/>
    <image href="https://ritwickdey.gallerycdn.vsassets.io/extensions/ritwickdey/liveserver/5.7.10/1772184436918/Microsoft.VisualStudio.Services.Icons.Default"
           x="-16" y="-16" width="32" height="32" style="pointer-events:none;"/>
    <text y="34" text-anchor="middle" font-size="10" fill="#777" font-family="Segoe UI,sans-serif">Go Live</text>
  </a>

  <!-- ===== GMAIL (badge 2) ===== -->
  <line id="line-gmail" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <a href="https://gmail.com/" target="_blank" id="node-gmail">
    <circle class="icon-circle" r="36" id="bg-gmail"/>
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Gmail_icon_%282020%29.svg/330px-Gmail_icon_%282020%29.svg.png"
           x="-30" y="-30" width="60" height="60" clip-path="url(#clip-gmail)" style="pointer-events:none;"/>
    <text y="50" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI,sans-serif" font-weight="500">Gmail</text>
    <!-- Badge -->
    <circle cx="-26" cy="-26" r="11" fill="#EA4335" stroke="#fff" stroke-width="2"/>
    <text x="-26" y="-22" text-anchor="middle" font-size="12" fill="#fff" font-family="Segoe UI,sans-serif" font-weight="700">2</text>
  </a>
  <a href="https://support.google.com/mail/answer/56256?hl=en" target="_blank" id="branch-gmail">
    <circle class="branch-circle" r="22" id="bbg-gmail"/>
    <text x="0" y="5" text-anchor="middle" font-size="18" fill="#EA4335" font-family="Arial,sans-serif" font-weight="700">G</text>
    <text y="34" text-anchor="middle" font-size="10" fill="#777" font-family="Segoe UI,sans-serif">Create</text>
  </a>

  <!-- ===== GIT (badge 3) with two children ===== -->
  <line id="line-git-win" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line id="line-git-mac" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <a href="https://github.com/git-guides/install-git" target="_blank" id="node-git">
    <circle class="icon-circle" r="36" id="bg-git"/>
    <image href="https://git-scm.com/images/logos/downloads/Git-Icon-1788C.png"
           x="-30" y="-30" width="60" height="60" clip-path="url(#clip-git)" style="pointer-events:none;"/>
    <text y="50" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI,sans-serif" font-weight="500">Git</text>
    <!-- Badge -->
    <circle cx="-26" cy="-26" r="11" fill="#F05032" stroke="#fff" stroke-width="2"/>
    <text x="-26" y="-22" text-anchor="middle" font-size="12" fill="#fff" font-family="Segoe UI,sans-serif" font-weight="700">3</text>
  </a>
  <a href="https://gitforwindows.org/" target="_blank" id="branch-git-win">
    <circle class="branch-circle" r="22" id="bbg-git-win"/>
    <g transform="translate(-10,-10)">
      <rect x="0" y="0" width="9" height="9" fill="#00ADEF"/>
      <rect x="11" y="0" width="9" height="9" fill="#00ADEF"/>
      <rect x="0" y="11" width="9" height="9" fill="#00ADEF"/>
      <rect x="11" y="11" width="9" height="9" fill="#00ADEF"/>
    </g>
    <text y="34" text-anchor="middle" font-size="10" fill="#777" font-family="Segoe UI,sans-serif">Windows</text>
  </a>
  <a href="https://sourceforge.net/projects/git-osx-installer/files/git-2.23.0-intel-universal-mavericks.dmg" target="_blank" id="branch-git-mac">
    <circle class="branch-circle" r="22" id="bbg-git-mac"/>
    <path d="M 4,-8 C 2,-10 -2,-10 -4,-8 C -8,-6 -9,0 -7,5 C -5,9 -2,10 0,9 C 2,8 3,8 5,9 C 7,10 10,9 11,5 C 8,3 7,-2 9,-5 C 7,-7 5,-8 4,-8 Z M 2,-11 C 3,-13 5,-14 6,-13 C 6,-11 4,-10 2,-10 Z"
          fill="#555" transform="scale(0.8)"/>
    <text y="34" text-anchor="middle" font-size="10" fill="#777" font-family="Segoe UI,sans-serif">Mac</text>
  </a>

  <!-- ===== GITHUB (badge 4) ===== -->
  <line id="line-github" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <a href="https://github.com/" target="_blank" id="node-github">
    <circle class="icon-circle" r="36" id="bg-github"/>
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/GitHub_logo_2013.svg/330px-GitHub_logo_2013.svg.png"
           x="-30" y="-30" width="60" height="60" clip-path="url(#clip-github)" style="pointer-events:none;"/>
    <text y="50" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI,sans-serif" font-weight="500">GitHub</text>
    <!-- Badge -->
    <circle cx="-26" cy="-26" r="11" fill="#24292e" stroke="#fff" stroke-width="2"/>
    <text x="-26" y="-22" text-anchor="middle" font-size="12" fill="#fff" font-family="Segoe UI,sans-serif" font-weight="700">4</text>
  </a>
  <a href="https://github.com/signup?ref_cta=Sign+up&ref_loc=header+logged+out&ref_page=%2F&source=header-home" target="_blank" id="branch-github">
    <circle class="branch-circle" r="22" id="bbg-github"/>
    <circle cx="0" cy="-3" r="8" fill="#24292e"/>
    <ellipse cx="-6" cy="6" rx="3" ry="5" fill="#24292e"/>
    <ellipse cx="6" cy="6" rx="3" ry="5" fill="#24292e"/>
    <circle cx="0" cy="-3" r="5" fill="#fff"/>
    <text y="34" text-anchor="middle" font-size="10" fill="#777" font-family="Segoe UI,sans-serif">Sign Up</text>
  </a>

  <!-- ===== VS CODE + GITHUB (badge 5) with child ===== -->
  <line id="line-combo" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,4"/>
  <a href="VS-code-connect-github.html" target="_blank" id="node-combo">
    <circle class="icon-circle" r="36" id="bg-combo"/>
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Visual_Studio_Code_1.35_icon.svg/250px-Visual_Studio_Code_1.35_icon.svg.png"
           x="-30" y="-30" width="60" height="60" clip-path="url(#clip-combo)" style="pointer-events:none;"/>
    <text y="50" text-anchor="middle" font-size="12" fill="#555" font-family="Segoe UI,sans-serif" font-weight="500">VS Code + GitHub</text>
    <!-- Badge -->
    <circle cx="-26" cy="-26" r="11" fill="#6f42c1" stroke="#fff" stroke-width="2"/>
    <text x="-26" y="-22" text-anchor="middle" font-size="12" fill="#fff" font-family="Segoe UI,sans-serif" font-weight="700">5</text>
  </a>
  <a href="https://benchvue.github.io/vibe-coding/week-3/my-first-repository-guide.html" target="_blank" id="branch-combo">
    <circle class="branch-circle" r="22" id="bbg-combo"/>
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/GitHub_logo_2013.svg/330px-GitHub_logo_2013.svg.png"
           x="-16" y="-16" width="32" height="32" clip-path="url(#clip-combo-child)" style="pointer-events:none;"/>
    <text y="34" text-anchor="middle" font-size="10" fill="#777" font-family="Segoe UI,sans-serif">First Repo</text>
  </a>
</svg>

<script>
const CX = 320, CY = 320, R = 180, BRANCH_DIST = 95;

// 5 main nodes 72° apart, starting TOP (270°) going CLOCKWISE
const nodes = [
  { id: 'vscode', angleDeg: 270, hasBranch: true  }, // 12 o'clock  - badge 1
  { id: 'gmail',  angleDeg: 342, hasBranch: true  }, // upper-right - badge 2
  { id: 'git',    angleDeg: 54,  hasBranch: false }, // lower-right - badge 3 (custom children)
  { id: 'github', angleDeg: 126, hasBranch: true  }, // lower-left  - badge 4
  { id: 'combo',  angleDeg: 198, hasBranch: true  }  // upper-left  - badge 5
];

nodes.forEach(({ id, angleDeg, hasBranch }) => {
  const rad = angleDeg * Math.PI / 180;
  const mx = CX + R * Math.cos(rad);
  const my = CY + R * Math.sin(rad);
  document.getElementById('node-' + id).setAttribute('transform', `translate(${mx},${my})`);

  if (hasBranch) {
    const bx = CX + (R + BRANCH_DIST) * Math.cos(rad);
    const by = CY + (R + BRANCH_DIST) * Math.sin(rad);
    document.getElementById('branch-' + id).setAttribute('transform', `translate(${bx},${by})`);

    const line = document.getElementById('line-' + id);
    line.setAttribute('x1', mx + 36 * Math.cos(rad));
    line.setAttribute('y1', my + 36 * Math.sin(rad));
    line.setAttribute('x2', bx - 22 * Math.cos(rad));
    line.setAttribute('y2', by - 22 * Math.sin(rad));
  }
});

// Git's two children fan outward from Git node (at 54°)
const gitRad = 54 * Math.PI / 180;
const gitX = CX + R * Math.cos(gitRad);
const gitY = CY + R * Math.sin(gitRad);

const gitChildren = [
  { id: 'branch-git-win', lineId: 'line-git-win', angleDeg: 36 },
  { id: 'branch-git-mac', lineId: 'line-git-mac', angleDeg: 72 }
];

gitChildren.forEach(({ id, lineId, angleDeg }) => {
  const rad = angleDeg * Math.PI / 180;
  const bx = CX + (R + BRANCH_DIST) * Math.cos(rad);
  const by = CY + (R + BRANCH_DIST) * Math.sin(rad);
  document.getElementById(id).setAttribute('transform', `translate(${bx},${by})`);

  const dx = bx - gitX;
  const dy = by - gitY;
  const len = Math.sqrt(dx * dx + dy * dy);
  const ux = dx / len;
  const uy = dy / len;
  const line = document.getElementById(lineId);
  line.setAttribute('x1', gitX + 36 * ux);
  line.setAttribute('y1', gitY + 36 * uy);
  line.setAttribute('x2', bx - 22 * ux);
  line.setAttribute('y2', by - 22 * uy);
});

// Hover effects for all main nodes
['vscode','gmail','git','github','combo'].forEach(id => {
  const node = document.getElementById('node-' + id);
  const bg   = document.getElementById('bg-' + id);
  node.addEventListener('mouseenter', () => { bg.setAttribute('stroke','#999'); bg.setAttribute('filter','drop-shadow(0 3px 8px rgba(0,0,0,0.12))'); });
  node.addEventListener('mouseleave', () => { bg.setAttribute('stroke','#ddd'); bg.removeAttribute('filter'); });
});

// Hover effects for all branches (now including combo)
const branches = [
  { b: 'branch-vscode',  c: 'bbg-vscode'  },
  { b: 'branch-gmail',   c: 'bbg-gmail'   },
  { b: 'branch-github',  c: 'bbg-github'  },
  { b: 'branch-git-win', c: 'bbg-git-win' },
  { b: 'branch-git-mac', c: 'bbg-git-mac' },
  { b: 'branch-combo',   c: 'bbg-combo'   }
];
branches.forEach(({ b, c }) => {
  const branch = document.getElementById(b);
  const bbg    = document.getElementById(c);
  branch.addEventListener('mouseenter', () => { bbg.setAttribute('stroke','#999'); bbg.setAttribute('filter','drop-shadow(0 2px 6px rgba(0,0,0,0.1))'); });
  branch.addEventListener('mouseleave', () => { bbg.setAttribute('stroke','#ddd'); bbg.removeAttribute('filter'); });
});
</script>

<div class="footer">click an icon or its branch to open the tool</div>

</body>
</html>
